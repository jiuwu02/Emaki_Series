name: Publish Wiki

on:
  push:
    branches:
      - main
    paths:
      - "wiki/**"
      - ".github/workflows/publish-wiki.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-wiki:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Detect wiki availability
        id: wiki-status
        env:
          REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN_FALLBACK: ${{ github.token }}
        run: |
          set -euo pipefail

          REPO_RESPONSE="$(curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN_FALLBACK}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPOSITORY}")"

          HAS_WIKI="$(python -c 'import json, sys; print(str(json.load(sys.stdin).get("has_wiki", False)).lower())' <<< "$REPO_RESPONSE")"
          echo "has_wiki=$HAS_WIKI" >> "$GITHUB_OUTPUT"

          if [ "$HAS_WIKI" != "true" ]; then
            echo "Repository wiki is disabled. Skipping publish."
          fi

      - name: Publish repository wiki
        if: steps.wiki-status.outputs.has_wiki == 'true'
        env:
          REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN_FALLBACK: ${{ github.token }}
          WIKI_PUSH_TOKEN: ${{ secrets.WIKI_PUSH_TOKEN }}
        run: |
          set -euo pipefail

          if [ ! -d "wiki" ]; then
            echo "wiki source folder is missing"
            exit 1
          fi

          TOKEN="${WIKI_PUSH_TOKEN:-$GITHUB_TOKEN_FALLBACK}"
          WORK_DIR="$(mktemp -d)"
          WIKI_DIR="$WORK_DIR/wiki"
          WIKI_URL="https://x-access-token:${TOKEN}@github.com/${REPOSITORY}.wiki.git"
          TARGET_BRANCH="master"

          if ! git ls-remote "$WIKI_URL" >/dev/null 2>&1; then
            echo "GitHub Wiki backend is not reachable yet."
            echo "Please make sure the repository Wiki is enabled and create the first Wiki page manually on GitHub."
            echo "After that, rerun this workflow from Actions."
            exit 0
          fi

          git clone "$WIKI_URL" "$WIKI_DIR"
          CURRENT_BRANCH="$(git -C "$WIKI_DIR" branch --show-current)"
          if [ -n "$CURRENT_BRANCH" ]; then
            TARGET_BRANCH="$CURRENT_BRANCH"
          fi

          rsync -a --delete --exclude ".git/" wiki/ "$WIKI_DIR"/

          git -C "$WIKI_DIR" config user.name "github-actions[bot]"
          git -C "$WIKI_DIR" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "$WIKI_DIR" add -A

          if git -C "$WIKI_DIR" diff --cached --quiet; then
            echo "No wiki changes to publish."
            exit 0
          fi

          git -C "$WIKI_DIR" commit -m "Sync wiki from repository"
          git -C "$WIKI_DIR" push origin "HEAD:${TARGET_BRANCH}"
