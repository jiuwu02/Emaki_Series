id: "flame_crystal"
display_name: "<gold>烈焰晶石</gold>"
description:
  - "<red>蕴含火焰之力的晶石"
  - "<gray>可为武器附加火焰属性"

item: "ni-material_flame_crystal"

capacity_cost:
  type: "constant"
  value: 10

priority:
  type: "constant"
  value: 20

effects:
  - type: "stat_contribution"
    stats:
      fire_damage:
        type: "constant"
        value: 10
      critical_chance:
        type: "constant"
        value: 5

  - type: "name_modify"
    operation: "append_suffix"
    value: "<red> [烈焰]"

  - type: "lore_operation"
    action:
      - operation: "insert_below"
        target_pattern: "锻造属性:"
        content:
          - "<red>火焰伤害: +{fire_damage}"
          - "<yellow>暴击率: +{critical_chance}%"
