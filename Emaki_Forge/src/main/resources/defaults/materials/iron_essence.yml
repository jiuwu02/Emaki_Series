id: "iron_essence"
display_name: "<white>铁精粹</white>"
description:
  - "<gray>蕴含铁之精华的材料"
  - "<gray>可用于强化武器的基础材料"

item: "ni-material_iron_essence"

capacity_cost:
  type: "constant"
  value: 5

priority:
  type: "constant"
  value: 10

effects:
  - type: "stat_contribution"
    stats:
      physical_damage:
        type: "constant"
        value: 5
      max_health:
        type: "constant"
        value: 2

  - type: "lore_action"
    action:
      - action: "insert_below"
        target_pattern: "锻造属性:"
        content:
          - "<gray>物理攻击: <red>+{physical_damage}"
          - "<gray>生命值: <green>+{max_health}"
