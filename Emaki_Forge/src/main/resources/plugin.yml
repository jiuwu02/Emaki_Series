name: Emaki_Forge
prefix: ${project.name}
main: emaki.jiuwu.craft.forge.EmakiForgePlugin
version: ${project.version}
api-version: "1.21"
depend:
  - Emaki_CoreLib
softdepend:
  - PlaceholderAPI
  - MMOItems
  - NeigeItems
  - CraftEngine
commands:
  emakiforge:
    aliases: [emforge, forge]
    permission: emakiforge.use
permissions:
  emakiforge.use:
    default: true
  emakiforge.book:
    default: true
  emakiforge.reload:
    default: op
  emakiforge.debug:
    default: op
  emakiforge.admin:
    default: op
