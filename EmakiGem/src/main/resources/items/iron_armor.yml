id: "iron_armor"

match:
  item_sources:
    - "minecraft-iron_helmet"
    - "minecraft-iron_chestplate"
    - "minecraft-iron_leggings"
    - "minecraft-iron_boots"
  slot_groups:
    - "armor"
  lore_contains: []

slots:
  - index: 0
    type: "defense"
    display_name: "<blue>防御插槽</blue>"
  - index: 1
    type: "utility"
    display_name: "<green>辅助插槽</green>"
  - index: 2
    type: "universal"
    display_name: "<white>通用插槽</white>"

default_open_slots: 1

allowed_gem_types:
  - "defense"
  - "utility"
  - "universal"

max_same_type: 0

max_same_id: 1

gui:
  gem_template: "gem/default"
  open_template: "open/default"

structured_presentation:
  name_contributions:
    - slot_id: "gem.item.prefix"
      position: "PREFIX"
      order: 100
      content_template: "<blue>✦</blue> "
  lore_sections:
    - section_id: "gem.overview"
      order: 101
      lines:
        - "<dark_gray>─────────────</dark_gray>"
