# 货币字段仅接受 currency_id。
id: "ruby_attack"
gem_type: "attack"
tier: 1
item_source: "minecraft-redstone"

stats:
  physical_attack: 8
  physical_crit_rate: 3
attributes:
  physical_attack: 8.0
  physical_crit_rate: 3.0

socket_compatibility:
  - "attack"
  - "universal"

structured_presentation:
  name_contributions:
    - slot_id: "gem.slot.{slot_index}.badge"
      position: "POSTFIX"
      order: 300
      content_template: " <red>[{display_name}]</red>"
  lore_sections:
    - section_id: "gem.slot.{slot_index}.detail"
      order: 200
      lines:
        - "<red>◆ {display_name}: 物理攻击+{physical_attack}
          暴击率+{physical_crit_rate}%</red>"

inlay_cost:
  currencies:
    - provider: "vault"
      currency_id: ""
      base_cost: 1000
      cost_formula: "{base_cost} * {tier}"
      display_name: "<gold>金币</gold>"
  materials:
    - item: "minecraft-gold_nugget"
      amount: 1

extract_cost:
  currencies:
    - provider: "vault"
      currency_id: ""
      base_cost: 500
      cost_formula: "{base_cost} * {tier}"
      display_name: "<gold>金币</gold>"
  materials:
    - item: "minecraft-iron_nugget"
      amount: 1

extract_return:
  mode: "original"

