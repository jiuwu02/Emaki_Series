id: "strengthen_gui"
title: "<dark_gray>装备强化</dark_gray>"
rows: 5

slots:
  top_frame:
    slots: [0, 1, 2, 3, 4, 5, 6, 7, 8]
    item: "GRAY_STAINED_GLASS_PANE"
    display_name: "<gray>"

  bottom_frame:
    slots: [36, 37, 38, 39, 41, 42, 43, 44]
    item: "GRAY_STAINED_GLASS_PANE"
    display_name: "<gray>"

  side_frame:
    slots: [9, 17, 18, 26, 27, 35]
    item: "BLACK_STAINED_GLASS_PANE"
    display_name: "<dark_gray>"

  target_item:
    slots: [13]
    type: "target_item"
    item: "LIGHT_BLUE_STAINED_GLASS_PANE"
    display_name: "<aqua>放入待强化装备</aqua>"
    lore:
      - "<gray>支持所有可识别为 Emaki 来源的装备"
      - "<gray>会叠加 strengthen 层，不覆盖 forge 层"

  preview_display:
    slots: [15]
    type: "preview_display"
    item: "BOOK"
    display_name: "<gold>强化预览</gold>"
    lore:
      - "<gray>这里会展示成功率、花费与所需材料"
      - "<gray>固定材料直接从背包中扣除"

  temper_display:
    slots: [22]
    type: "temper_display"
    item: "INK_SAC"
    display_name: "<gold>锻印状态</gold>"
    lore:
      - "<gray>失败后会累积锻印，提高后续成功率"

  material_input_1:
    slots: [19]
    type: "material_input_1"
    item: "GOLD_NUGGET"
    display_name: "<yellow>可选材料槽 I</yellow>"
    lore:
      - "<gray>可放入保护类或锻印类可选材料"

  material_input_2:
    slots: [20]
    type: "material_input_2"
    item: "PAPER"
    display_name: "<yellow>可选材料槽 II</yellow>"
    lore:
      - "<gray>可放入本次强化需要的可选材料"

  material_input_3:
    slots: [29]
    type: "material_input_3"
    item: "ECHO_SHARD"
    display_name: "<yellow>可选材料槽 III</yellow>"
    lore:
      - "<gray>支持多种突破或保护类材料"

  material_input_4:
    slots: [30]
    type: "material_input_4"
    item: "POTION"
    display_name: "<yellow>可选材料槽 IV</yellow>"
    lore:
      - "<gray>可放入会提供额外锻印的材料"

  confirm:
    slots: [40]
    type: "confirm"
    item: "ANVIL"
    display_name: "<green>确认强化</green>"
    lore:
      - "<gray>点击后将结算货币与材料"
      - "<gray>失败会累积锻印，并可能掉星</gray>"
    click: "ui.button.click-1-1"
