id: "offhand_focus"
display_name: "<light_purple>副手强化</light_purple>"
base_cost: 260

stat_lines:
  skill_damage_bonus: "<gray>技能增伤: <gold>{sign}{value}</gold></gray>"
  skill_cdr: "<gray>技能冷却缩减: <gold>{sign}{value}</gold></gray>"
  skill_crit_rate: "<gray>技能暴击率: <gold>{sign}{value}</gold></gray>"
  mana_regen: "<gray>法力回复: <gold>{sign}{value}</gold></gray>"
  health: "<gray>生命值: <gold>{sign}{value}</gold></gray>"
  dodge_chance: "<gray>闪避率: <gold>{sign}{value}</gold></gray>"

stars:
  1: { stats: { skill_damage_bonus: 1, health: 6 } }
  2: { stats: { skill_damage_bonus: 1, health: 6 } }
  3: { stats: { skill_damage_bonus: 1.5, health: 8 } }
  4: { stats: { skill_damage_bonus: 2, health: 8 } }
  5: { stats: { skill_damage_bonus: 2, health: 10 } }
  6: { stats: { skill_damage_bonus: 2.5, health: 10 } }
  7: { stats: { skill_damage_bonus: 3, health: 12 } }
  8: { stats: { skill_damage_bonus: 3.5, health: 12 } }
  9: { stats: { skill_damage_bonus: 4, health: 14 } }
  10: { stats: { skill_damage_bonus: 4.5, health: 14 } }
  11: { stats: { skill_damage_bonus: 5, health: 16 } }
  12: { stats: { skill_damage_bonus: 6, health: 18 } }

milestones:
  5:
    name: "<light_purple>冷却缩减提升</light_purple>"
    stats: { skill_cdr: 2 }
    presentation:
      - "<gray>强化达到 +5 后，副手会额外提供技能冷却缩减。</gray>"
    action:
      - 'sendmessage text="<light_purple>强化达到 +5，解锁额外技能冷却缩减。</light_purple>"'
      - 'playsound sound=minecraft:item.shield.block volume=1 pitch=1.1'
  8:
    name: "<light_purple>暴击率提升</light_purple>"
    stats: { skill_crit_rate: 3 }
    presentation:
      - "<gray>强化达到 +8 后，副手会额外提供技能暴击率。</gray>"
    action:
      - 'sendtitle title="<light_purple><bold>+8 技能暴击率提升</bold></light_purple>" subtitle="<white>额外暴击率已解锁</white>"'
      - 'playsound sound=minecraft:entity.player.levelup volume=1 pitch=1.2'
  10:
    name: "<light_purple>法力回复提升</light_purple>"
    stats: { mana_regen: 8 }
    presentation:
      - "<gray>强化达到 +10 后，副手会额外提供法力回复。</gray>"
    action:
      - 'sendtitle title="<light_purple><bold>+10 法力回复提升</bold></light_purple>" subtitle="<white>法力回复已解锁</white>"'
      - 'playsound sound=minecraft:block.amethyst_block.resonate volume=1 pitch=1'
  12:
    name: "<light_purple>闪避提升</light_purple>"
    stats: { dodge_chance: 4 }
    presentation:
      - "<gray>强化达到 +12 后，副手会额外提供闪避率。</gray>"
    action:
      - 'sendtitle title="<light_purple><bold>+12 闪避提升</bold></light_purple>" subtitle="<white>闪避率已解锁</white>"'
      - 'playsound sound=minecraft:ui.toast.challenge_complete volume=1 pitch=1'
