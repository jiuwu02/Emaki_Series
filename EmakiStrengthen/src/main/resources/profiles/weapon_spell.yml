id: "weapon_spell"
display_name: "<aqua>法术武器强化</aqua>"
base_cost: 320

stat_lines:
  spell_attack: "<gray>法术伤害: <gold>{sign}{value}</gold></gray>"
  spell_crit_rate: "<gray>法术暴击率: <gold>{sign}{value}</gold></gray>"
  spell_damage_bonus: "<gray>法术增伤: <gold>{sign}{value}</gold></gray>"
  spell_crit_damage: "<gray>法术暴伤: <gold>{sign}{value}</gold></gray>"
  magic_penetration: "<gray>法术穿透: <gold>{sign}{value}</gold></gray>"

stars:
  1: { stats: { spell_attack: 4 } }
  2: { stats: { spell_attack: 4 } }
  3: { stats: { spell_attack: 5 } }
  4: { stats: { spell_attack: 6 } }
  5: { stats: { spell_attack: 6 } }
  6: { stats: { spell_attack: 7 } }
  7: { stats: { spell_attack: 8 } }
  8: { stats: { spell_attack: 9 } }
  9: { stats: { spell_attack: 10 } }
  10: { stats: { spell_attack: 12 } }
  11: { stats: { spell_attack: 14 } }
  12: { stats: { spell_attack: 16 } }

milestones:
  5:
    name: "<aqua>暴击率提升</aqua>"
    stats: { spell_crit_rate: 2 }
    presentation:
      - "<gray>强化达到 +5 后，法术武器会额外提供暴击率。</gray>"
    action:
      - 'sendmessage text="<aqua>强化达到 +5，解锁额外法术暴击率。</aqua>"'
      - 'playsound sound=minecraft:block.enchantment_table.use volume=1 pitch=1.1'
  8:
    name: "<aqua>伤害提升</aqua>"
    stats: { spell_damage_bonus: 4 }
    presentation:
      - "<gray>强化达到 +8 后，法术武器会额外提供增伤。</gray>"
    action:
      - 'sendtitle title="<aqua><bold>+8 法术增伤提升</bold></aqua>" subtitle="<white>额外增伤已解锁</white>"'
      - 'playsound sound=minecraft:entity.player.levelup volume=1 pitch=1.25'
  10:
    name: "<aqua>暴击伤害提升</aqua>"
    stats: { spell_crit_damage: 6 }
    presentation:
      - "<gray>强化达到 +10 后，法术武器会额外提供暴击伤害。</gray>"
    action:
      - 'sendtitle title="<aqua><bold>+10 法术暴伤提升</bold></aqua>" subtitle="<white>额外暴伤已解锁</white>"'
      - 'playsound sound=minecraft:entity.evoker.prepare_attack volume=1 pitch=1'
  12:
    name: "<aqua>穿透提升</aqua>"
    stats: { magic_penetration: 8 }
    presentation:
      - "<gray>强化达到 +12 后，法术武器会额外提供穿透。</gray>"
    action:
      - 'sendtitle title="<aqua><bold>+12 法术穿透提升</bold></aqua>" subtitle="<white>额外穿透已解锁</white>"'
      - 'playsound sound=minecraft:ui.toast.challenge_complete volume=1 pitch=1'
