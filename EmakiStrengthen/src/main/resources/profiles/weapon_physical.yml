id: "weapon_physical"
display_name: "<gold>物理武器强化</gold>"
base_cost: 320

stat_lines:
  physical_attack: "<gray>物理伤害: <gold>{sign}{value}</gold></gray>"
  physical_crit_rate: "<gray>物理暴击率: <gold>{sign}{value}</gold></gray>"
  physical_damage_bonus: "<gray>物理增伤: <gold>{sign}{value}</gold></gray>"
  physical_crit_damage: "<gray>物理暴伤: <gold>{sign}{value}</gold></gray>"
  physical_armor_penetration: "<gray>物理穿透: <gold>{sign}{value}</gold></gray>"

stars:
  1: { stats: { physical_attack: 4 } }
  2: { stats: { physical_attack: 4 } }
  3: { stats: { physical_attack: 5 } }
  4: { stats: { physical_attack: 6 } }
  5: { stats: { physical_attack: 6 } }
  6: { stats: { physical_attack: 7 } }
  7: { stats: { physical_attack: 8 } }
  8: { stats: { physical_attack: 9 } }
  9: { stats: { physical_attack: 10 } }
  10: { stats: { physical_attack: 12 } }
  11: { stats: { physical_attack: 14 } }
  12: { stats: { physical_attack: 16 } }

milestones:
  5:
    name: "<gold>暴击率提升</gold>"
    stats: { physical_crit_rate: 2 }
    presentation:
      - "<gray>强化达到 +5 后，物理武器会额外提供暴击率。</gray>"
    action:
      - 'sendmessage text="<gold>强化达到 +5，解锁额外物理暴击率。</gold>"'
      - 'playsound sound=minecraft:block.anvil.use volume=1 pitch=1.15'
  8:
    name: "<gold>伤害提升</gold>"
    stats: { physical_damage_bonus: 4 }
    presentation:
      - "<gray>强化达到 +8 后，物理武器会额外提供增伤。</gray>"
    action:
      - 'sendtitle title="<gold><bold>+8 物理增伤提升</bold></gold>" subtitle="<yellow>额外增伤已解锁</yellow>"'
      - 'playsound sound=minecraft:entity.player.levelup volume=1.1 pitch=1.2'
  10:
    name: "<gold>暴击伤害提升</gold>"
    stats: { physical_crit_damage: 6 }
    presentation:
      - "<gray>强化达到 +10 后，物理武器会额外提供暴击伤害。</gray>"
    action:
      - 'sendtitle title="<gold><bold>+10 物理暴伤提升</bold></gold>" subtitle="<yellow>额外暴伤已解锁</yellow>"'
      - 'playsound sound=minecraft:entity.firework_rocket.twinkle_far volume=1 pitch=1'
  12:
    name: "<gold>穿透提升</gold>"
    stats: { physical_armor_penetration: 8 }
    presentation:
      - "<gray>强化达到 +12 后，物理武器会额外提供穿透。</gray>"
    action:
      - 'sendtitle title="<gold><bold>+12 物理穿透提升</bold></gold>" subtitle="<yellow>额外穿透已解锁</yellow>"'
      - 'playsound sound=minecraft:ui.toast.challenge_complete volume=1 pitch=1'
