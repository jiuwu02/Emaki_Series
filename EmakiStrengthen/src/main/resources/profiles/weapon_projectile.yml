id: "weapon_projectile"
display_name: "<green>投射物武器强化</green>"
base_cost: 320

stat_lines:
  projectile_attack: "<gray>投射物伤害: <gold>{sign}{value}</gold></gray>"
  projectile_crit_rate: "<gray>投射物暴击率: <gold>{sign}{value}</gold></gray>"
  projectile_damage_bonus: "<gray>投射物增伤: <gold>{sign}{value}</gold></gray>"
  projectile_crit_damage: "<gray>投射物暴伤: <gold>{sign}{value}</gold></gray>"
  projectile_penetration: "<gray>投射物穿透: <gold>{sign}{value}</gold></gray>"

stars:
  1: { stats: { projectile_attack: 4 } }
  2: { stats: { projectile_attack: 4 } }
  3: { stats: { projectile_attack: 5 } }
  4: { stats: { projectile_attack: 6 } }
  5: { stats: { projectile_attack: 6 } }
  6: { stats: { projectile_attack: 7 } }
  7: { stats: { projectile_attack: 8 } }
  8: { stats: { projectile_attack: 9 } }
  9: { stats: { projectile_attack: 10 } }
  10: { stats: { projectile_attack: 12 } }
  11: { stats: { projectile_attack: 14 } }
  12: { stats: { projectile_attack: 16 } }

milestones:
  5:
    name: "<green>暴击率提升</green>"
    stats: { projectile_crit_rate: 2 }
    presentation:
      - "<gray>强化达到 +5 后，投射物武器会额外提供暴击率。</gray>"
    action:
      - 'sendmessage text="<green>强化达到 +5，解锁额外投射物暴击率。</green>"'
      - 'playsound sound=minecraft:item.crossbow.loading_end volume=1 pitch=1.15'
  8:
    name: "<green>伤害提升</green>"
    stats: { projectile_damage_bonus: 4 }
    presentation:
      - "<gray>强化达到 +8 后，投射物武器会额外提供增伤。</gray>"
    action:
      - 'sendtitle title="<green><bold>+8 投射物增伤提升</bold></green>" subtitle="<yellow>额外增伤已解锁</yellow>"'
      - 'playsound sound=minecraft:entity.player.levelup volume=1 pitch=1.2'
  10:
    name: "<green>暴击伤害提升</green>"
    stats: { projectile_crit_damage: 6 }
    presentation:
      - "<gray>强化达到 +10 后，投射物武器会额外提供暴击伤害。</gray>"
    action:
      - 'sendtitle title="<green><bold>+10 投射物暴伤提升</bold></green>" subtitle="<yellow>额外暴伤已解锁</yellow>"'
      - 'playsound sound=minecraft:entity.arrow.hit_player volume=1 pitch=1'
  12:
    name: "<green>穿透提升</green>"
    stats: { projectile_penetration: 8 }
    presentation:
      - "<gray>强化达到 +12 后，投射物武器会额外提供穿透。</gray>"
    action:
      - 'sendtitle title="<green><bold>+12 投射物穿透提升</bold></green>" subtitle="<yellow>额外穿透已解锁</yellow>"'
      - 'playsound sound=minecraft:ui.toast.challenge_complete volume=1 pitch=1'
