# ========================================
# EmakiStrengthen 强化配方 - 通用强化（纯外观）
# ========================================
# 通用强化配方，不提供战斗属性加成，仅提供外观展示效果。
# 适用于无法匹配到特定武器/防具配方的装备。
# ========================================

# 配方 ID
id: "generic_visual"

# 配方显示名称
display_name: "<gray>通用强化</gray>"

# GUI 模板
gui_template: "strengthen_gui"

# ========================================
# 经济系统配置
# ========================================
economy:
  enabled: true
  currencies:
    - provider: "vault"
      currency_id: ""
      base_cost: 160
      cost_formula: "{base_cost} * {star}"
      display_name: "<gold>金币</gold>"

# ========================================
# 强化上限与概率配置
# ========================================
limits:
  max_star: 12
  max_temper: 4
  temper_chance_bonus_per_level: 5.0
  success_chance_cap: 90.0

# ========================================
# 每星级成功率配置
# ========================================
success_rates:
  1: 100.0
  2: 100.0
  3: 95.0
  4: 85.0
  5: 75.0
  6: 60.0
  7: 45.0
  8: 32.0
  9: 22.0
  10: 14.0
  11: 8.0
  12: 4.0

# ========================================
# 星级定义
# ========================================
# 注意：通用强化没有 stats 和 ea_attributes 字段，
# 因为它不提供战斗属性，仅修改外观展示
stars:
  1:
    materials:
      - item: "copper_ingot"
        amount: 1
      - item: "gunpowder"
        amount: 2
  2:
    materials:
      - item: "copper_ingot"
        amount: 1
      - item: "gunpowder"
        amount: 3
  3:
    materials:
      - item: "copper_ingot"
        amount: 2
      - item: "gunpowder"
        amount: 4
  4:
    materials:
      - item: "copper_ingot"
        amount: 2
      - item: "gunpowder"
        amount: 5
      - item: "gold_nugget"
        amount: -1
        optional: true
        protection: true
  # +5 里程碑：开始显示强化标记
  5:
    name: "<gray>外观强化 I</gray>"
    materials:
      - item: "copper_ingot"
        amount: 3
      - item: "gunpowder"
        amount: 6
      - item: "gold_nugget"
        amount: -1
        optional: true
        protection: true
    presentation:
      - "<gray>虽然不提供战斗属性，但会开始显示强化标记。</gray>"
    success_actions:
      - 'sendmessage text="<gray>强化达到 +5，物品开始显示强化标记。</gray>"'
  6:
    materials:
      - item: "copper_ingot"
        amount: 4
      - item: "gunpowder"
        amount: 8
      - item: "gold_nugget"
        amount: -1
        optional: true
        protection: true
  7:
    materials:
      - item: "copper_ingot"
        amount: 5
      - item: "gunpowder"
        amount: 10
      - item: "gold_nugget"
        amount: -1
        optional: true
        protection: true
  # +8 里程碑：外观效果增强
  8:
    name: "<gray>外观强化 II</gray>"
    materials:
      - item: "copper_ingot"
        amount: 6
      - item: "gunpowder"
        amount: 12
      - item: "paper"
        amount: 2
      - item: "gold_nugget"
        amount: -1
        optional: true
        protection: true
    presentation:
      - "<gray>高星强化会让物品的展示效果更加明显。</gray>"
    success_actions:
      - 'sendtitle title="<gray><bold>+8 外观强化 II</bold></gray>" subtitle="<white>外观效果已提升</white>"'
  9:
    materials:
      - item: "copper_ingot"
        amount: 8
      - item: "gunpowder"
        amount: 16
      - item: "paper"
        amount: 2
      - item: "gold_nugget"
        amount: -1
        optional: true
        protection: true
  # +10 里程碑：进一步增强展示效果
  10:
    name: "<gray>外观强化 III</gray>"
    materials:
      - item: "copper_ingot"
        amount: 10
      - item: "gunpowder"
        amount: 20
      - item: "echo_shard"
        amount: 2
      - item: "gold_nugget"
        amount: -1
        optional: true
        protection: true
    presentation:
      - "<gray>强化达到 +10 后，会进一步增强展示效果。</gray>"
    success_actions:
      - 'sendtitle title="<gray><bold>+10 外观强化 III</bold></gray>" subtitle="<white>外观效果继续提升</white>"'
  11:
    materials:
      - item: "copper_ingot"
        amount: 13
      - item: "gunpowder"
        amount: 26
      - item: "echo_shard"
        amount: 3
      - item: "gold_nugget"
        amount: -1
        optional: true
        protection: true
  # +12 满星里程碑：最高外观效果
  12:
    name: "<gray>外观强化 IV</gray>"
    materials:
      - item: "copper_ingot"
        amount: 16
      - item: "gunpowder"
        amount: 32
      - item: "echo_shard"
        amount: 4
      - item: "gold_nugget"
        amount: -1
        optional: true
        protection: true
      - item: "potion"
        amount: -1
        optional: true
        temper_boost: 1
    presentation:
      - "<gray>强化达到 +12 后，会获得最高等级的默认展示效果。</gray>"
    success_actions:
      - 'sendtitle title="<gray><bold>+12 外观强化 IV</bold></gray>" subtitle="<white>最高外观效果已解锁</white>"'

# ========================================
# 展示配置
# ========================================
presentation:
  name_operations:
    - type: "name_regex_replace"
      pattern: "^(.*?)\\s*\\[\\+(\\d+)\\]\\s*$"
      replacement: "$1 [+{star}]"
    - type: "name_append"
      value: " [+{star}]"
      condition: "if_unchanged"
  lore_prepend:
    - "<gradient:#F2C46D:#C9703D>强化等级 +{star}</gradient>"
    - "<gray>锻印: {temper_color}{temper}/{max_temper}</gray>"
