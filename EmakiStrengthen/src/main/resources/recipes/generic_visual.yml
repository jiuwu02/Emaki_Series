structured_presentation:
  name_contributions:
    - slot_id: "strengthen.badge"
      position: "POSTFIX"
      order: 200
      content_template: " [+{star}]"
  lore_sections:
    - section_id: "strengthen.header.primary"
      order: 200
      lines:
        - "<gradient:#F2C46D:#C9703D>强化等级 +{star}</gradient>"
    - section_id: "strengthen.header.secondary"
      order: 220
      lines:
        - "<gray>锻印: {temper_color}{temper}/{max_temper}</gray>"
