id: "weapon_physical"

display_name: "<gold>物理武器强化</gold>"

gui_template: "strengthen_gui"

economy:
  enabled: true
  currencies:
    - provider: "vault"
      currency_id: ""
      base_cost: 320
      cost_formula: "{base_cost} * {star}"
      display_name: "<gold>金币</gold>"

limits:
  max_star: 12
  max_temper: 4
  temper_chance_bonus_per_level: 5.0
  success_chance_cap: 90.0

success_rates:
  1: 100.0
  2: 100.0
  3: 95.0
  4: 85.0
  5: 75.0
  6: 60.0
  7: 45.0
  8: 32.0
  9: 22.0
  10: 14.0
  11: 8.0
  12: 4.0

match:
  slot_groups:
    - "weapon"

stat_lines:
  physical_attack:
    template: "<gray>物理伤害: <gold>{sign}{value}</gold></gray>"
    section_id: "strengthen.stats.primary"
    section_order: 210
  physical_crit_rate:
    template: "<gray>物理暴击率: <gold>{sign}{value}</gold></gray>"
    section_id: "strengthen.stats.secondary"
    section_order: 240
  physical_damage_bonus:
    template: "<gray>物理伤害: <gold>{sign}{value}</gold></gray>"
    section_id: "strengthen.stats.secondary"
    section_order: 240
  physical_crit_damage:
    template: "<gray>物理暴伤: <gold>{sign}{value}</gold></gray>"
    section_id: "strengthen.stats.secondary"
    section_order: 240
  physical_armor_penetration:
    template: "<gray>物理穿透: <gold>{sign}{value}</gold></gray>"
    section_id: "strengthen.stats.secondary"
    section_order: 240

