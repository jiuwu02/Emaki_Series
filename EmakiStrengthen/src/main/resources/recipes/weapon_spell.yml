id: "weapon_spell"

display_name: "<aqua>法术武器强化</aqua>"

gui_template: "strengthen_gui"

economy:
  enabled: true
  currencies:
    - provider: "vault"
      currency_id: ""
      base_cost: 320
      cost_formula: "{base_cost} * {star}"
      display_name: "<gold>金币</gold>"

limits:
  max_star: 12
  max_temper: 4
  temper_chance_bonus_per_level: 5.0
  success_chance_cap: 90.0

success_rates:
  1: 100.0
  2: 100.0
  3: 95.0
  4: 85.0
  5: 75.0
  6: 60.0
  7: 45.0
  8: 32.0
  9: 22.0
  10: 20.0
  11: 12.0
  12: 6.0

match:
  lore_contains:
    - "法术伤害"
  stats_any:
    - "spell_attack"

stat_lines:
  spell_attack:
    template: "<gray>法术伤害: <gold>{sign}{value}</gold></gray>"
    section_id: "strengthen.stats.primary"
    section_order: 210
  spell_crit_rate:
    template: "<gray>法术暴击率: <gold>{sign}{value}</gold></gray>"
    section_id: "strengthen.stats.secondary"
    section_order: 240
  spell_damage_bonus:
    template: "<gray>法术增伤: <gold>{sign}{value}</gold></gray>"
    section_id: "strengthen.stats.secondary"
    section_order: 240
  spell_crit_damage:
    template: "<gray>法术暴伤: <gold>{sign}{value}</gold></gray>"
    section_id: "strengthen.stats.secondary"
    section_order: 240
  magic_penetration:
    template: "<gray>法术穿透: <gold>{sign}{value}</gold></gray>"
    section_id: "strengthen.stats.secondary"
    section_order: 240

stars:
  1:
    stats:
      spell_attack: 4
    ea_attributes:
      spell_attack: 4.0
    materials:
