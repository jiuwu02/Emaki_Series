    success_actions:
      - 'sendtitle title="<light_purple><bold>+12 闪避提升</bold></light_purple>" subtitle="<white>闪避率已解锁</white>"'

presentation:
  name_operations:
    - type: "name_regex_replace"
      pattern: "^(.*?)\\s*\\[\\+(\\d+)\\]\\s*$"
      replacement: "$1 [+{star}]"
    - type: "name_append"
      value: " [+{star}]"
      condition: "if_unchanged"
  lore_prepend:
    - "<gradient:#F2C46D:#C9703D>强化等级 +{star}</gradient>"
    - "<gray>锻印: {temper_color}{temper}/{max_temper}</gray>"
