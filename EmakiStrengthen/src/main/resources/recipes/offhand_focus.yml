      - item: "gold_nugget"
        amount: -1
        optional: true
        protection: true
    presentation: ["<gray>强化达到 +10 后，副手会额外提供法力上限。</gray>"]
    success_actions:
      - 'sendtitle title="<light_purple><bold>+10 法力上限提升</bold></light_purple>" subtitle="<white>额外法力上限已解锁</white>"'
  11:
    {
      stats: { spell_damage_bonus: 5, health: 16 },
      materials:
        [
          { item: "copper_ingot", amount: 13 },
          { item: "gunpowder", amount: 26 },
          { item: "echo_shard", amount: 3 },
          { item: "gold_nugget", amount: -1, optional: true, protection: true },
