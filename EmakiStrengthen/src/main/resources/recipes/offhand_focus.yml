    stats: { spell_damage_bonus: 6, health: 18, dodge_chance: 4 }
    materials:
      - item: "copper_ingot"
        amount: 16
      - item: "gunpowder"
        amount: 32
      - item: "echo_shard"
        amount: 4
      - item: "gold_nugget"
        amount: -1
        optional: true
        protection: true
      - item: "potion"
        amount: -1
        optional: true
        temper_boost: 1
