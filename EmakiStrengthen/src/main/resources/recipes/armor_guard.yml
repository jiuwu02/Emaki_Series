id: "armor_guard"
display_name: "<yellow>防具强化</yellow>"
gui_template: "strengthen_gui"

economy:
  enabled: true
  currencies:
    - provider: "vault"
      currency_id: ""
      base_cost: 220
      cost_formula: "{base_cost} * {star}"
      display_name: "<gold>金币</gold>"

limits:
  max_star: 12
  max_temper: 4
  temper_chance_bonus_per_level: 5.0
  success_chance_cap: 90.0

match:
  slot_groups: ["armor"]

stat_lines:
  physical_defense:
    template: "<gray>物理防御: <gold>{sign}{value}</gold></gray>"
    lore_operations:
      - type: "lore_search_insert"
        anchor: "强化等级"
        position: "below"
      - type: "lore_append"
  projectile_defense:
    template: "<gray>投射物防御: <gold>{sign}{value}</gold></gray>"
    lore_operations:
      - type: "lore_append"
  spell_defense:
    template: "<gray>法术防御: <gold>{sign}{value}</gold></gray>"
    lore_operations:
      - type: "lore_append"
  health:
    template: "<gray>生命值: <gold>{sign}{value}</gold></gray>"
    lore_operations:
      - type: "lore_append"
  health_regen:
    template: "<gray>生命回复: <gold>{sign}{value}</gold></gray>"
    lore_operations:
      - type: "lore_append"
  dodge_chance:
    template: "<gray>闪避率: <gold>{sign}{value}</gold></gray>"
    lore_operations:
      - type: "lore_append"

stars:
  1:
    {
      stats: { physical_defense: 2, projectile_defense: 2, spell_defense: 2 },
      materials:
        [{ item: "copper_ingot", amount: 1 }, { item: "gunpowder", amount: 2 }],
    }
  2:
    {
      stats: { physical_defense: 2, projectile_defense: 2, spell_defense: 2 },
      materials:
        [{ item: "copper_ingot", amount: 1 }, { item: "gunpowder", amount: 3 }],
    }
  3:
    {
      stats:
        { physical_defense: 2.5, projectile_defense: 2.5, spell_defense: 2.5 },
      materials:
        [{ item: "copper_ingot", amount: 2 }, { item: "gunpowder", amount: 4 }],
    }
  4:
    {
      stats: { physical_defense: 3, projectile_defense: 3, spell_defense: 3 },
      materials:
        [
          { item: "copper_ingot", amount: 2 },
          { item: "gunpowder", amount: 5 },
          { item: "gold_nugget", amount: -1, optional: true, protection: true },
        ],
    }
  5:
    name: "<yellow>生命值提升</yellow>"
    stats:
      {
        physical_defense: 3,
        projectile_defense: 3,
        spell_defense: 3,
        health: 20,
      }
    materials:
      - item: "copper_ingot"
        amount: 3
      - item: "gunpowder"
        amount: 6
      - item: "gold_nugget"
        amount: -1
        optional: true
        protection: true
    presentation: ["<gray>强化达到 +5 后，防具会额外提供生命值。</gray>"]
    success_actions:
      - 'sendmessage text="<yellow>强化达到 +5，解锁额外生命值。</yellow>"'
  6:
    {
      stats:
        { physical_defense: 3.5, projectile_defense: 3.5, spell_defense: 3.5 },
      materials:
        [
          { item: "copper_ingot", amount: 4 },
          { item: "gunpowder", amount: 8 },
          { item: "gold_nugget", amount: -1, optional: true, protection: true },
        ],
    }
  7:
    {
      stats: { physical_defense: 4, projectile_defense: 4, spell_defense: 4 },
      materials:
        [
          { item: "copper_ingot", amount: 5 },
          { item: "gunpowder", amount: 10 },
          { item: "gold_nugget", amount: -1, optional: true, protection: true },
        ],
    }
  8:
    name: "<yellow>额外生命值</yellow>"
    stats:
      {
        physical_defense: 4.5,
        projectile_defense: 4.5,
        spell_defense: 4.5,
        health: 30,
      }
    materials:
      - item: "copper_ingot"
        amount: 6
      - item: "gunpowder"
        amount: 12
      - item: "paper"
        amount: 2
      - item: "gold_nugget"
        amount: -1
        optional: true
        protection: true
    presentation: ["<gray>强化达到 +8 后，防具会继续提升生命值。</gray>"]
    success_actions:
      - 'sendtitle title="<yellow><bold>+8 生命值提升</bold></yellow>" subtitle="<white>额外生命值已解锁</white>"'
  9:
    {
      stats: { physical_defense: 5, projectile_defense: 5, spell_defense: 5 },
      materials:
        [
          { item: "copper_ingot", amount: 8 },
          { item: "gunpowder", amount: 16 },
          { item: "paper", amount: 2 },
          { item: "gold_nugget", amount: -1, optional: true, protection: true },
        ],
    }
  10:
    name: "<yellow>生命回复提升</yellow>"
    stats:
      {
        physical_defense: 6,
        projectile_defense: 6,
        spell_defense: 6,
        health_regen: 4,
      }
    materials:
      - item: "copper_ingot"
        amount: 10
      - item: "gunpowder"
        amount: 20
      - item: "echo_shard"
        amount: 2
      - item: "gold_nugget"
        amount: -1
        optional: true
        protection: true
    presentation: ["<gray>强化达到 +10 后，防具会额外提供生命回复。</gray>"]
    success_actions:
      - 'sendtitle title="<yellow><bold>+10 生命回复提升</bold></yellow>" subtitle="<white>生命回复已解锁</white>"'
  11:
    {
      stats: { physical_defense: 7, projectile_defense: 7, spell_defense: 7 },
      materials:
        [
          { item: "copper_ingot", amount: 13 },
          { item: "gunpowder", amount: 26 },
          { item: "echo_shard", amount: 3 },
          { item: "gold_nugget", amount: -1, optional: true, protection: true },
        ],
    }
  12:
    name: "<yellow>闪避提升</yellow>"
    stats:
      {
        physical_defense: 8,
        projectile_defense: 8,
        spell_defense: 8,
        dodge_chance: 4,
      }
    materials:
      - item: "copper_ingot"
        amount: 16
      - item: "gunpowder"
        amount: 32
      - item: "echo_shard"
        amount: 4
      - item: "gold_nugget"
        amount: -1
        optional: true
        protection: true
      - item: "potion"
        amount: -1
        optional: true
        temper_boost: 1
    presentation: ["<gray>强化达到 +12 后，防具会额外提供闪避率。</gray>"]
    success_actions:
      - 'sendtitle title="<yellow><bold>+12 闪避提升</bold></yellow>" subtitle="<white>闪避率已解锁</white>"'

presentation:
  name_operations:
    - type: "name_regex_replace"
      pattern: "^(.*?)\\s*\\[\\+(\\d+)\\]\\s*$"
      replacement: "$1 [+{star}]"
    - type: "name_append"
      value: " [+{star}]"
      condition: "if_unchanged"
  lore_prepend:
    - "<gradient:#F2C46D:#C9703D>强化等级 +{star}</gradient>"
    - "<gray>锻印: {temper_color}{temper}/{max_temper}</gray>"
