version: "3.3.0"

general:
  prefix: "<gray>[ <gradient:#F2C46D:#C9703D>装备强化</gradient> ]</gray>"
  no_permission: "<red>你没有权限执行此操作。</red>"
  player_only: "<red>此命令只能由玩家执行。</red>"
  player_not_found: "<red>未找到目标玩家。</red>"
