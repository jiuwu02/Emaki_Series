    footer: "<gold>==================================</gold>"
    line: "<yellow>{cmd}</yellow> <gray>- {desc}</gray>"
    desc:
      help: "显示帮助信息"
      open: "打开强化界面"
      reload: "重载强化配置和 GUI"
      inspect: "查看手持物品强化状态"
      refresh: "刷新玩家背包中的强化层"
      setstar: "直接设置主手物品星级"
      clearstate: "移除主手物品上的强化层"
      clearcrack: "清除主手物品裂痕"
      givecatalyst: "发放强化材料"
  inspect:
    header: "<gold>========== {player} 的强化状态 ==========</gold>"
    line: "<yellow>{key}</yellow> <gray>- {value}</gray>"
  refresh:
    success: "<green>已刷新 <yellow>{player}</yellow> 背包中的强化层。</green>"
  setstar:
    success: "<green>主手物品已设置为 <gold>+{star}</gold>。</green>"
  clearstate:
    success: "<green>已清空主手物品上的强化层。</green>"
