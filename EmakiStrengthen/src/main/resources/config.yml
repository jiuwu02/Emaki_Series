# ========================================
# EmakiStrengthen 主配置文件
# ========================================
# EmakiStrengthen 是 Emaki 系列的强化插件，支持装备强化等级系统、
# 属性加成、强化成功率、失败惩罚、保护机制等完整的强化流程。
# 本文件控制强化系统的全局行为。
# ========================================

# 配置文件版本号（由版本迁移器自动管理，请勿手动修改）
config_version: "3.0.0"

# 语言设置，对应 lang/ 目录下的语言文件
language: "zh_CN"

# 是否释放默认数据文件（recipes、gui 等）
# 设为 false 可避免覆盖已自定义的配置文件
# 首次安装建议设为 true，确认文件生成后改为 false
release_default_data: true

# ========================================
# 全局强化上限配置
# ========================================
# 所有配方的强化等级不能超过此上限
# 配方级别可设置更低的 max_level，但不能超过此值
global_max_level: 20

# ========================================
# 默认成功率配置
# ========================================
# 当配方未指定自定义成功率公式时，使用此默认公式
default_success_rate:
  # 基础成功率（百分比，0-100）
  base: 100
  # 每级递减率：每提升 1 级，成功率减少此百分比
  # 例如：base=100, decay=5, level=5 → 成功率 = 100 - 5*5 = 75%
  decay_per_level: 5
  # 最低成功率：成功率不会低于此值
  minimum: 5

# ========================================
# 默认失败惩罚配置
# ========================================
# 强化失败时的默认惩罚规则
default_failure_penalty:
  # 惩罚类型：
  #   none       - 无惩罚
  #   downgrade  - 降低 1 级
  #   destroy    - 销毁物品
  #   reset      - 等级重置为 0
  type: "downgrade"
  # 惩罚触发条件：
  #   always     - 每次失败都触发
  #   above_level - 仅在等级高于指定值时触发
  condition: "always"
  # 当 condition 为 above_level 时的等级阈值
  threshold: 10

# ========================================
# 保护机制配置
# ========================================
# 保护道具可在强化失败时防止惩罚
protection:
  # 是否启用保护机制
  enabled: true
  # 保护物品来源
  item: "minecraft:nether_star"
  # 保护物品消耗数量
  cost: 1
  # 保护触发条件：
  #   always       - 每次失败都消耗保护道具
  #   above_level  - 仅在等级高于指定值时消耗
  condition: "above_level"
  # 保护触发等级阈值
  threshold: 10

# ========================================
# 数值格式化配置
# ========================================
number_format:
  # 默认格式
  default: "0.##"
  # 整数格式
  integer: "0"
  # 百分比格式
  percentage: "0.##%"

# ========================================
# 权限配置
# ========================================
permission:
  # OP 玩家是否跳过强化条件检查
  op_bypass: false

# ========================================
# 条件配置
# ========================================
condition:
  # 当条件表达式无法解析时，是否视为条件不通过
  invalid_as_failure: true

# ========================================
# 历史记录配置
# ========================================
history:
  # 是否启用强化历史记录
  enabled: true
  # 是否自动保存历史记录到磁盘
  auto_save: true
  # 自动保存间隔（tick），6000 tick = 5 分钟
  save_interval: 6000

# 调试模式：开启后会在控制台输出强化执行的详细日志
debug: false
