# ========================================
# EmakiStrengthen 主配置文件
# ========================================
# EmakiStrengthen 是 Emaki 系列的强化插件，支持装备强化等级系统、
# 属性加成、强化成功率、失败惩罚、保护机制等完整的强化流程。
# 本文件控制强化系统的全局行为。
# ========================================

# 配置文件版本号（由版本迁移器自动管理，请勿手动修改）
config_version: "3.2.0"

# 语言设置，对应 lang/ 目录下的语言文件
language: "zh_CN"

# 本地广播半径，强化成功/高星广播只会发送给该半径内玩家
local_broadcast_radius: 48

# ========================================
# 全局成功率配置
# ========================================
# 当某个配方没有给某个目标星级配置 success_rates 时，
# 会回退使用这里的全局成功率。
success_rates:
  1: 100.0
  2: 100.0
  3: 95.0
  4: 85.0
  5: 75.0
  6: 60.0
  7: 45.0
  8: 32.0
  9: 22.0
  10: 14.0
  11: 8.0
  12: 4.0
