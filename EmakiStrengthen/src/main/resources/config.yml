# 强化系统主配置
# config_version 由资源同步维护
config_version: "3.2.0"

# 语言文件 ID
language: "zh_CN"

# 本地广播半径
local_broadcast_radius: 48

broadcast:
  # 达到这些星级时发送附近广播
  local_stars:
    - 8
  # 达到这些星级时发送全服广播
  global_stars:
    - 10
    - 12

# 配方未单独配置时使用这里的全局成功率
success_rates:
  1: 100.0
  2: 100.0
  3: 95.0
  4: 85.0
  5: 75.0
  6: 60.0
  7: 45.0
  8: 32.0
  9: 22.0
  10: 14.0
  11: 8.0
  12: 4.0
