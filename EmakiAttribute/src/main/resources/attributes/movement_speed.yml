# ========================================
# EmakiAttribute 属性定义 - movement_speed
# ========================================
# 移动速度属性，属于 FLAT 类型，单位为方块每秒。
# ========================================

# 属性 ID
id: movement_speed

# 显示名称
display_name: "移动速度"

# 值类型：FLAT 表示固定数值加成
value_kind: FLAT

# 目标类型：GENERIC 表示通用属性
target_type: GENERIC

# 目标 ID
target_id: movement_speed

# 默认值
default_value: 0.0

# 最小值（允许减速效果，故允许负值）
min_value: -1000.0

# 最大值
max_value: 1000.0

# 是否允许负值（减速效果需要负值）
allow_negative: true

# 优先级
priority: 51

# Lore 格式：使用固定数值格式，显示为 "移动速度 +3"
lore_format_id: default_flat

# 战斗力系数
attribute_power: 1.0

# 属性描述
description: "Flat movement speed in blocks per second."
