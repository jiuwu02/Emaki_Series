# ========================================
# EmakiAttribute 属性定义 - attack_speed
# ========================================
# 攻击速度属性，属于 FLAT 类型，单位为次/秒（Hit/s）。
# 攻击冷却 = 1 / attack_speed
# 此属性包含自定义的 lore_patterns 用于从 Lore 中读取已有数值。
# ========================================

# 属性 ID
id: attack_speed

# 显示名称
display_name: "攻击速度"

# 值类型：FLAT 表示固定数值加成
value_kind: FLAT

# 目标类型：GENERIC 表示通用属性
target_type: GENERIC

# 目标 ID
target_id: attack_speed

# 默认值
default_value: 0.0

# 最小值
min_value: 0.0

# 最大值
max_value: 999999.0

# 是否允许负值
allow_negative: false

# 优先级
priority: 35

# Lore 格式：使用固定数值格式
lore_format_id: default_flat

# 自定义 Lore 读取正则：用于从物品已有的 Lore 行中提取属性值
# 格式说明：
#   {Key}   - 匹配属性显示名称（如 "攻击速度"）
#   {Value} - 匹配数值部分（如 "4.0 Hit/s"）
# 此正则匹配形如 "攻击速度: 4.0 Hit/s" 的 Lore 行
lore_patterns:
  - "{Key}.*?: ?{Value} Hit/s$"

# 战斗力系数
attribute_power: 1.0

# 属性描述
description: "Adds attack rate in hits per second; cooldown is the inverse."
