# ========================================
# EmakiAttribute PDC 读取条件规则 - 装备等级限制
# ========================================
# 本文件定义了从 PDC 读取 "gem_equipment_level" 源属性时的条件过滤规则。
# 用于实现装备等级限制：当装备的 required_level 属性超过玩家等级时，
# 该源的属性值不会被纳入属性快照。
# 默认禁用，需手动启用。
# ========================================

# 是否启用此条件规则（默认禁用）
enabled: false

# 源标识符
source_id: gem_equipment_level

# 条件类型：所有条件必须全部满足
condition_type: all_of

# 当条件表达式中的占位符无法解析时，是否视为条件不通过
invalid_as_failure: true

# 自由检查项列表示例
# 这里直接读取 Lore 纯文本中的等级需求，然后拿捕获组 $1 和玩家等级比较
checks:
  - type: lore_regex
    pattern: "装备等级需求: Lv\\.(\\d+)"
    condition: "$1 <= %player_level%"
