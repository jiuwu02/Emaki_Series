# ========================================
# EmakiAttribute PDC 读取条件规则 - 灵魂绑定
# ========================================
# 本文件定义了从 PDC 读取 "gem_bind" 源属性时的条件过滤规则。
# 用于实现灵魂绑定：当装备绑定的玩家名称与当前持有者不一致时，
# 该源的属性值不会被纳入属性快照。
# 默认禁用，需手动启用。
# ========================================

# 是否启用此条件规则（默认禁用）
enabled: false

# 源标识符
source_id: gem_bind

# 条件类型：所有条件必须全部满足
condition_type: all_of

# 当条件表达式中的占位符无法解析时，是否视为条件不通过
invalid_as_failure: true

# 条件表达式列表
conditions:
  # 要求装备绑定的玩家名称与当前持有者一致
  - "%source_meta_bound_player% == %player_name%"
