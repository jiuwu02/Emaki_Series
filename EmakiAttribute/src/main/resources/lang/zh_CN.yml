command:
  unknown: "<red>未知子命令: /{label} help</red>"

  reload:
    no_permission: "<red>你没有权限执行此命令。</red>"
    in_progress: "<yellow>属性系统正在重载中，请稍后。</yellow>"
    started: "<gray>已提交异步重载任务，后续进度会继续回传。</gray>"
    success: "<green>已重新加载属性系统。</green>"
    failed: "<red>属性系统重载失败: {error}</red>"
    summary: "<gray>属性 {attributes} 项，伤害类型 {damage_types} 项，默认组 {profiles} 个。</gray>"

  resync:
    no_permission: "<red>你没有权限执行此命令。</red>"
    self_success: "<green>已为你重新同步属性。</green>"
    console_usage: "<yellow>控制台用法: /emakiattribute resync <player|all></yellow>"
    player_not_found: "<red>未找到玩家 {player}。</red>"
    player_success: "<green>已为 {player} 重新同步属性。</green>"
    all_success: "<green>已为所有在线玩家重新同步属性。</green>"

  preview:
    no_permission: "<red>你没有权限执行此命令。</red>"
    console_usage: "<yellow>控制台用法: /emakiattribute preview <player> <slot></yellow>"
    player_not_found: "<red>未找到玩家 {player}。</red>"
    invalid_slot: "<red>无效槽位 {slot}，可用值: main_hand/off_hand/helmet/chestplate/leggings/boots。</red>"
    no_item: "<yellow>该槽位没有物品。</yellow>"
    item: "<gray>物品: {item}</gray>"
    name: "<gray>名称: {name}</gray>"
    signature: "<gray>签名: {signature}</gray>"
    values: "<gray>数值: {values}</gray>"

  dump:
    no_permission: "<red>你没有权限执行此命令。</red>"
    player_not_found: "<red>未找到玩家 {player}。</red>"
    console_usage: "<yellow>控制台用法: /emakiattribute dump <player></yellow>"
    player: "<green>正在查看玩家 {player} 的属性快照。</green>"
    signature: "<gray>签名 <dark_gray>(悬停查看)</dark_gray></gray>"
    values: "<gray>属性数值 <dark_gray>(悬停查看)</dark_gray></gray>"
    resource_line: "<gray>{resource}: 默认 {default_max}，加成 {bonus_max}，上限 {current_max}，当前 {current}</gray>"

  debug:
    no_permission: "<red>你没有权限执行此命令。</red>"
    player_not_found: "<red>未找到玩家 {player}。</red>"
    console_usage: "<yellow>控制台用法: /emakiattribute debug <player> [on|off|toggle]</yellow>"
    enabled: "<green>已为 {player} 开启战斗调试日志，后续相关命中会输出到控制台。</green>"
    disabled: "<yellow>已为 {player} 关闭战斗调试日志。</yellow>"

  lint:
    no_permission: "<red>你没有权限执行此命令。</red>"
    header: "<gold>========== EmakiAttribute 自检 ==========</gold>"
    footer: "<gold>==========================================</gold>"
    config_status: "<gray>配置: {config}</gray>"
    ok: "<green>{name} 没有发现问题。</green>"
    issues: "<yellow>{name} 发现 {count} 个问题。</yellow>"

  help:
    header: "<gold>========== EmakiAttribute 帮助 ==========</gold>"
    footer: "<gold>========================================</gold>"
    reload: "<gray>/emakiattribute reload</gray> 重新加载配置与词条。"
    resync: "<gray>/emakiattribute resync [玩家|all]</gray> 重新同步玩家属性。"
    preview: "<gray>/emakiattribute preview [玩家] [槽位]</gray> 预览某个槽位的属性快照。"
    dump: "<gray>/emakiattribute dump [玩家]</gray> 导出当前战斗快照与资源状态。"
    debug: "<gray>/emakiattribute debug [玩家] [on|off|toggle]</gray> 追踪该玩家相关的战斗链并输出详细控制台日志。"
    lint: "<gray>/emakiattribute lint</gray> 检查配置与资源加载问题。"
