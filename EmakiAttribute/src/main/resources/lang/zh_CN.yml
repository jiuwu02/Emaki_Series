lang_version: "2.1.0"
general:
  prefix: "<gray>[ <gradient:#66D9EF:#7B7BFF>EmakiAttribute</gradient> ]</gray>"

console:
  plugin_started: "<green>EmakiAttribute 已启动。</green>"
  plugin_stopped: "<yellow>EmakiAttribute 已关闭。</yellow>"
  config_load_failed: "<red>配置读取失败: {error}</red>"
  reload_stage_failed: "<yellow>重载阶段 {stage} 失败: <red>{error}</red></yellow>"
  vanilla_attribute_resolve_failed: "<yellow>无法解析原版属性映射: <red>{attribute}</red> -> <red>{target}</red></yellow>"
  attribute_key_contains_conflict: "<yellow>[属性注册] 检测到词条关键字包含冲突: <aqua>{lower_display_name}</aqua> (<white>{lower_id}</white>, 优先级 {lower_priority}) 的关键字 <white>{lower_key}</white> 包含了 <aqua>{higher_display_name}</aqua> (<white>{higher_id}</white>, 优先级 {higher_priority}) 的关键字 <white>{higher_key}</white>。这会因为优先级较低导致读取失效，请提高优先级或修改 display_name。</yellow>"
  mmoitems_bridge_unavailable: "<yellow>MMOItems 属性映射桥初始化失败: <red>{error}</red></yellow>"
  mmoitems_stat_resolve_failed: "<yellow>MMOItems 属性映射无法解析统计项: 属性 <aqua>{attribute}</aqua> -> <red>{stat}</red></yellow>"
  mmoitems_stat_read_failed: "<yellow>MMOItems 属性映射读取失败: 属性 <aqua>{attribute}</aqua> -> <red>{stat}</red> (<red>{error}</red>)</yellow>"
  attribute_registry_empty: "<yellow>[属性注册] 未加载到任何属性定义。</yellow>"
  attribute_registry_summary: "<green>[属性注册] 已加载 {count} 项属性定义。</green>"
  attribute_registry_entry: "<gray>[属性注册]</gray> <white>{index}</white> <dark_gray>|</dark_gray> <aqua>{display_name}</aqua> <dark_gray>(</dark_gray><white>{id}</white><dark_gray>)</dark_gray> <dark_gray>|</dark_gray> <gray>默认值</gray> <yellow>{default_value}</yellow> <dark_gray>|</dark_gray> <gray>战力系数</gray> <light_purple>{attribute_power}</light_purple>"

loader:
  lang_directory_create_failed: "<red>无法创建语言目录: {path}</red>"
  bundled_language_load_failed: "<red>读取内置语言失败: {error}</red>"
  bundled_resource_missing: "<red>内置资源缺失: {resource}，无法写入 {path}</red>"
  bundled_resource_sync_failed: "<red>同步内置资源失败: {path} ({error})</red>"
  bundled_resource_write_failed: "<red>写入内置资源失败: {path} ({error})</red>"
  directory_create_failed: "<red>无法创建{type}目录: {path}</red>"
  schema_missing_id: "<red>{type}文件 {file} 缺少 ID 字段。</red>"
  schema_missing_section: "<red>{type}文件 {file} 缺少必要的 {field} 节点。</red>"
  schema_invalid_section: "<red>{type}文件 {file} 的 {field} 结构无效。</red>"
  schema_invalid_enum: "<red>{type}文件 {file} 的 {field} 枚举值无效。</red>"
  schema_invalid_number: "<red>{type}文件 {file} 的 {field} 不是有效数字。</red>"
  invalid_blank_id: "<red>{type}文件 {file} 的 ID 为空。</red>"
  duplicate_id: "<red>{type}文件 {file} 的 ID 重复: {id}。</red>"
  invalid_lore_pattern: "<red>{attribute} 的词条正则无效: {pattern} ({error})</red>"
  load_failed: "<red>读取{type}文件 {file} 失败: {error}</red>"

