# ========================================
# EmakiAttribute 默认属性组配置
# ========================================
# 属性组（Profile）定义了玩家的基础属性和资源上限。
# 每个玩家上线时会加载对应组的配置作为初始值。
# 本文件是全局默认组，所有玩家都会继承此配置。
# ========================================

# 组 ID，全局唯一标识
id: global

# 优先级：数值越低优先级越高，当多个组冲突时取优先级最高的
priority: 0

# 资源定义：控制生命值和法力值的上限与同步行为
resources:
  # 生命值资源配置
  health:
    # 显示名称（用于属性面板和调试信息）
    display_name: "生命值"
    # 默认最大值（玩家无任何属性加成时的基础生命上限）
    default_max: 20.0
    # 允许的最小上限值
    min_max: 1.0
    # 允许的最大上限值（防止属性堆叠导致数值溢出）
    max_max: 2048.0
    # 是否同步到 Bukkit 原版最大生命值属性
    # 设为 true 时，EA 生命上限会写入 Minecraft 的 GENERIC_MAX_HEALTH
    sync_to_bukkit: true
    # 玩家首次加载时是否将生命值回满
    full_on_init: true
  # 法力值资源配置
  mana:
    display_name: "法力值"
    default_max: 100.0
    min_max: 0.0
    max_max: 99999.0
    # 法力值不需要同步到原版属性，EA 系统自行管理
    sync_to_bukkit: false
    full_on_init: true

# 基础属性默认值：玩家无装备时的初始属性
# 键名对应 attributes/ 目录下定义的属性 ID
# 值为 0.0 表示无基础加成，所有属性值来源于装备和效果
attributes:
  physical_attack: 0.0
  physical_defense: 0.0
  physical_damage_bonus: 0.0
  physical_crit_rate: 0.0
  physical_crit_damage: 0.0
  projectile_attack: 0.0
  projectile_damage_bonus: 0.0
  projectile_crit_rate: 0.0
  projectile_crit_damage: 0.0
  projectile_defense: 0.0
  spell_attack: 0.0
  spell_damage_bonus: 0.0
  spell_crit_rate: 0.0
  spell_crit_damage: 0.0
  spell_defense: 0.0
  health_regen: 0.0
  mana_regen: 0.0
