# 属性系统主配置
# version 由资源同步维护
version: "3.4.0"

# 语言文件 ID
language: zh_CN

# 是否接管未命中白名单的原版伤害
# true 时，所有原版伤害都会进入 EA 结算；未命中的环境伤害会回退到默认伤害类型
# false 时，只有白名单中的伤害原因会进入 EA
hard_lock_damage: true

# 默认伤害类型 ID
default_damage_type: physical

# 资源自然回复间隔，单位 tick
regen_interval_ticks: 20

# 属性同步到 Bukkit 的延迟，单位 tick
sync_delay_ticks: 1

# 默认属性与资源基础值
default_profile:
  resources:
    health:
      display_name: "生命值"
      default_max: 20.0
      min_max: 1.0
      max_max: 2048.0
      sync_to_bukkit: true
      full_on_init: true
    mana:
      display_name: "法力值"
      default_max: 100.0
      min_max: 0.0
      max_max: 99999.0
      sync_to_bukkit: false
      full_on_init: true
  attributes:
    physical_attack: 0.0
    physical_defense: 0.0
    physical_damage_bonus: 0.0
    physical_crit_rate: 0.0
    physical_crit_damage: 150.0
    projectile_attack: 0.0
    projectile_damage_bonus: 0.0
    projectile_crit_rate: 0.0
    projectile_crit_damage: 0.0
    projectile_defense: 0.0
    spell_attack: 0.0
    spell_damage_bonus: 0.0
    spell_crit_rate: 0.0
    spell_crit_damage: 0.0
    spell_defense: 0.0
    health_regen: 0.1
    mana_regen: 0.1

synthetic_hit_feedback:
  # 接管原版伤害后，是否补发击退和受伤音效
  knockback: true
  knockback_strength: 0.4
  hurt_sound: true

# 允许进入 EA 结算的 DamageCause 白名单
# cause: Bukkit DamageCause
# damage_type: 对应 damage_types/ 下的伤害类型 ID
# damage: 使用的基础伤害值
allowed_damage_causes:
  - cause: CONTACT
    damage_type: physical
    damage: 1
  - cause: SUFFOCATION
    damage_type: physical
    damage: 1
  - cause: FALL
    damage_type: physical
    damage: 1
  - cause: FLY_INTO_WALL
    damage_type: physical
    damage: 1
  - cause: FALLING_BLOCK
    damage_type: physical
    damage: 1
  - cause: FIRE
    damage_type: physical
    damage: 1
  - cause: FIRE_TICK
    damage_type: physical
    damage: 1
  - cause: MELTING
    damage_type: physical
    damage: 1
  - cause: LAVA
    damage_type: physical
    damage: 1
  - cause: DROWNING
    damage_type: physical
    damage: 1
  - cause: DRYOUT
    damage_type: physical
    damage: 1
  - cause: BLOCK_EXPLOSION
    damage_type: physical
    damage: 1
  - cause: ENTITY_EXPLOSION
    damage_type: physical
    damage: 1
  - cause: VOID
    damage_type: physical
    damage: 1
  - cause: LIGHTNING
    damage_type: physical
    damage: 1
  - cause: WORLD_BORDER
    damage_type: physical
    damage: 1
  - cause: HOT_FLOOR
    damage_type: physical
    damage: 1
  - cause: CAMPFIRE
    damage_type: physical
    damage: 1
  - cause: CRAMMING
    damage_type: physical
    damage: 1
  - cause: FREEZE
    damage_type: physical
    damage: 1
  - cause: STARVATION
    damage_type: physical
    damage: 1
