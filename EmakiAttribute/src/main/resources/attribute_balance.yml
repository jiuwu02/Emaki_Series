# ========================================
# EmakiAttribute 属性权重与分组配置
# ========================================
# 本文件定义了所有属性的分组、角色和权重信息。
# - attributes 部分：描述每个属性的分组和角色，用于属性面板展示和逻辑分类
# - weights 部分：定义每个属性的战斗力权重系数，用于计算 attribute_power（综合战力评分）
#   权重越高，该属性对战斗力评分的贡献越大；0 表示不计入战力评分
# ========================================

schema_version: 1

# 属性分组与角色定义
attributes:
  # ---- 资源类属性 ----
  health:
    group: resource.health
    role: max_health
    summary: "增加最大生命值"
  mana:
    group: resource.mana
    role: max_mana
    summary: "增加最大法力值"
  health_regen:
    group: resource.health
    role: regen
    summary: "每秒恢复生命值"
  mana_regen:
    group: resource.mana
    role: regen
    summary: "每秒恢复法力值"

  # ---- 物理攻击/防御类属性 ----
  physical_attack:
    group: offense.physical
    role: primary_damage
    summary: "直接提升物理伤害"
  physical_damage_bonus:
    group: offense.physical
    role: damage_bonus
    summary: "提升物理伤害倍率"
  physical_defense:
    group: defense.physical
    role: mitigation
    summary: "降低受到的物理伤害"
  physical_armor_penetration:
    group: offense.physical
    role: penetration
    summary: "削弱目标的物理防御"
  physical_crit_rate:
    group: offense.physical
    role: crit_rate
    summary: "提升物理暴击率"
  physical_crit_damage:
    group: offense.physical
    role: crit_damage
    summary: "提升物理暴击伤害"
  physical_crit_evasion:
    group: defense.physical
    role: crit_evasion
    summary: "降低受到物理暴击的概率"
  physical_crit_multiplier_resistance:
    group: defense.physical
    role: crit_resistance
    summary: "降低受到的物理暴击倍率"

  # ---- 投射物攻击/防御类属性 ----
  projectile_attack:
    group: offense.projectile
    role: primary_damage
    summary: "直接提升投射物伤害"
  projectile_damage_bonus:
    group: offense.projectile
    role: damage_bonus
    summary: "提升投射物伤害倍率"
  projectile_defense:
    group: defense.projectile
    role: mitigation
    summary: "降低受到的投射物伤害"
  projectile_penetration:
    group: offense.projectile
    role: penetration
    summary: "削弱目标的投射物防御"
  projectile_crit_rate:
    group: offense.projectile
    role: crit_rate
    summary: "提升投射物暴击率"
  projectile_crit_damage:
    group: offense.projectile
    role: crit_damage
    summary: "提升投射物暴击伤害"
  projectile_crit_evasion:
    group: defense.projectile
    role: crit_evasion
    summary: "降低受到投射物暴击的概率"
  projectile_crit_multiplier_resistance:
    group: defense.projectile
    role: crit_resistance
    summary: "降低受到的投射物暴击倍率"

  # ---- 法术攻击/防御类属性 ----
  spell_attack:
    group: offense.spell
    role: primary_damage
    summary: "直接提升法术伤害"
  spell_damage_bonus:
    group: offense.spell
    role: damage_bonus
    summary: "提升法术伤害倍率"
  spell_defense:
    group: defense.spell
    role: mitigation
    summary: "降低受到的法术伤害"
  magic_penetration:
    group: offense.spell
    role: penetration
    summary: "削弱目标的法术防御"
  magic_crit_rate:
    group: offense.spell
    role: crit_rate
    summary: "提升法术暴击率"
  magic_crit_damage:
    group: offense.spell
    role: crit_damage
    summary: "提升法术暴击伤害"
  magic_crit_evasion:
    group: defense.spell
    role: crit_evasion
    summary: "降低受到法术暴击的概率"
  magic_crit_multiplier_resistance:
    group: defense.spell
    role: crit_resistance
    summary: "降低受到的法术暴击倍率"

  # ---- 移动与攻速类属性 ----
  speed:
    group: mobility.speed
    role: percent_speed
    summary: "按百分比提升当前移动速度"
  movement_speed:
    group: mobility.speed
    role: flat_speed
    summary: "按方块每秒提升移动速度"
  attack_speed:
    group: utility.combat
    role: item_cooldown
    summary: "降低手持物品使用冷却"

  # ---- 实体视觉/交互类属性 ----
  entity_scale:
    group: utility.visual
    role: scale
    summary: "调整实体体型大小"
  entity_interaction_range:
    group: utility.reach
    role: reach
    summary: "增加实体交互范围"

  # ---- 真实伤害类属性 ----
  real_damage:
    group: offense.true
    role: true_damage
    summary: "直接造成穿透类真实伤害"

  # ---- 吸血/续航类属性 ----
  lifesteal:
    group: sustain.lifesteal
    role: percent_heal
    summary: "按造成伤害的百分比回复生命"
  percentage_lifesteal:
    group: sustain.lifesteal
    role: flat_heal
    summary: "按固定数值回复生命"
  lifesteal_resistance:
    group: defense.sustain
    role: sustain_resistance
    summary: "降低敌方吸血效果"

  # ---- 闪避类属性 ----
  dodge_chance:
    group: defense.evasion
    role: dodge
    summary: "提升闪避概率"

  # ---- 元属性 ----
  attribute_power:
    group: meta.balance
    role: derived_power
    summary: "由其他属性推导出的战斗力"

# 属性战斗力权重系数
# 用于计算 attribute_power（综合战力评分）
# 公式: attribute_power = Σ(属性值 × 权重)
# 权重为 0 表示该属性不计入战力评分（如 attribute_power 本身）
weights:
  health: 0.35
  mana: 0.20
  health_regen: 0.30
  mana_regen: 0.18

  physical_attack: 1.00
  physical_damage_bonus: 0.80
  physical_defense: 0.78
  physical_armor_penetration: 0.70
  physical_crit_rate: 0.60
  physical_crit_damage: 0.50
  physical_crit_evasion: 0.55
  physical_crit_multiplier_resistance: 0.55

  projectile_attack: 1.00
  projectile_damage_bonus: 0.80
  projectile_defense: 0.78
  projectile_penetration: 0.70
  projectile_crit_rate: 0.60
  projectile_crit_damage: 0.50
  projectile_crit_evasion: 0.55
  projectile_crit_multiplier_resistance: 0.55

  spell_attack: 1.00
  spell_damage_bonus: 0.80
  spell_defense: 0.78
  magic_penetration: 0.70
  magic_crit_rate: 0.60
  magic_crit_damage: 0.50
  magic_crit_evasion: 0.55
  magic_crit_multiplier_resistance: 0.55

  speed: 0.45
  movement_speed: 0.85
  attack_speed: 0.75

  entity_scale: 0.10
  entity_interaction_range: 0.20
  real_damage: 1.20

  lifesteal: 0.65
  percentage_lifesteal: 0.60
  lifesteal_resistance: 0.55
  dodge_chance: 0.70

  attribute_power: 0.0
