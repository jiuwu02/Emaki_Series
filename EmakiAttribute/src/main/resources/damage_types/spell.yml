# ========================================
# EmakiAttribute 伤害类型定义 - spell（法术伤害）
# ========================================
# 法术伤害类型，与物理伤害类似但使用法术属性进行结算。
# 防御阶段使用 SUBTRACT 模式，将法术防御直接从伤害中扣除。
# ========================================

# 伤害类型 ID
id: spell

# 显示名称
display_name: "法术伤害"

# 别名
aliases: [magic_damage, magic, spell_damage]

# 允许的事件类型：MAGIC 对应原版药水伤害等法术类事件
allowed_events:
  - MAGIC

# 硬锁模式
hard_lock: true

# 伤害结算流水线
stages:
  # 阶段 1：法术攻击力计算
  - id: attack
    kind: FLAT_PERCENT
    source: ATTACKER
    mode: ADD
    flat_attributes: [spell_attack]
    percent_attributes: [spell_damage_bonus]

  # 阶段 2：法术暴击判定
  - id: crit
    kind: CUSTOM
    source: ATTACKER
    chance_attributes: [spell_crit_rate]
    multiplier_attributes: [spell_crit_damage]
    expression: "{input} * (1 + ({crit} * ({multiplier} / 100)))"

  # 阶段 3：法术防御减伤
  - id: defense
    kind: FLAT_PERCENT
    source: TARGET
    # SUBTRACT 模式：将防御值从伤害中扣除
    mode: SUBTRACT
    flat_attributes: [spell_defense]
    percent_attributes: []
    expression: "max(0, {input} - {flat})"

# 吸血回复
recovery:
  source: ATTACKER
  resistance_source: TARGET
  flat_attributes: [percentage_lifesteal]
  percent_attributes: [lifesteal]
  resistance_attributes: [lifesteal_resistance]

# 消息模板
attacker_message: "<gray>[<gold>{damage_type}</gold>]</gray> <green>你对 <white>{target}</white> 造成了 <yellow>{final_damage}</yellow> 点伤害</green>{critical_suffix}"
target_message: "<gray>[<gold>{damage_type}</gold>]</gray> <red>{attacker}</red> 对你造成了 <yellow>{final_damage}</yellow> 点伤害{critical_suffix}"

description: "Spell damage resolved entirely through Emaki attributes."
