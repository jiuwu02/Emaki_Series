id: skill
display_name: "技能伤害"
aliases: [ability, skill_damage]
allowed_events:
  - MAGIC
  - PROJECTILE
hard_lock: true
stages:
  - id: damage
    kind: FLAT_PERCENT
    source: ATTACKER
    mode: ADD
    flat_attributes: []
    percent_attributes: [skill_damage_bonus]
  - id: crit
    kind: CUSTOM
    source: ATTACKER
    chance_attributes: [skill_crit_rate]
    multiplier_attributes: [skill_crit_damage]
    expression: "{input} * (1 + ({crit} * ({multiplier} / 100)))"
  - id: cdr
    kind: CUSTOM
    source: ATTACKER
    percent_attributes: [skill_cdr]
    expression: "{input}"
recovery:
  source: ATTACKER
  resistance_source: TARGET
  flat_attributes: [percentage_lifesteal]
  percent_attributes: [lifesteal]
  resistance_attributes: [lifesteal_resistance]
attacker_message: "<gray>[<gold>{damage_type}</gold>]</gray> <green>你对 <white>{target}</white> 造成了 <yellow>{final_damage}</yellow> 点伤害</green>{critical_suffix}"
target_message: "<gray>[<gold>{damage_type}</gold>]</gray> <red>{attacker}</red> 对你造成了 <yellow>{final_damage}</yellow> 点伤害{critical_suffix}"
description: "Skill damage resolved entirely through Emaki attributes."
