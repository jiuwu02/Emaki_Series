# ========================================
# EmakiAttribute Lore 格式定义 - default_percent
# ========================================
# 百分比属性的 Lore 显示格式，用于暴击率、闪避率等概率属性。
# ========================================

# 格式 ID
id: default_percent

# 显示格式模板，末尾带 % 符号
# 示例输出：暴击率 +15%
format: "{name} {sign}{value}%"

# 小数精度
precision: 2

# 读取优先级（最高，确保百分比格式优先于普通数值格式匹配）
read_priority: 100

# Lore 读取正则，匹配带 % 的数值行
read_patterns:
  - "{Key}.*?: ?{Value}%$"
