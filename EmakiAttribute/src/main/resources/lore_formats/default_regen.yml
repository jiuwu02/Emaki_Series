# ========================================
# EmakiAttribute Lore 格式定义 - default_regen
# ========================================
# 回复类属性的 Lore 显示格式，用于生命回复、法力回复等每秒回复属性。
# ========================================

# 格式 ID
id: default_regen

# 显示格式模板，末尾带 "/秒" 后缀
# 示例输出：生命回复 +3.0/秒
format: "{name} {sign}{value}/秒"

# 小数精度（回复值通常只需 1 位小数）
precision: 1

# 读取优先级
read_priority: 80

# Lore 读取正则，匹配带 "/秒" 的数值行
read_patterns:
  - "{Key}.*?: ?{Value}/秒$"
