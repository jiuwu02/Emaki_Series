# ========================================
# EmakiAttribute Lore 格式定义 - default_flat
# ========================================
# Lore 格式定义了属性在物品 Lore 中的显示样式和读取规则。
# 每个属性定义通过 lore_format_id 引用一个格式文件。
# ========================================

# 格式 ID，必须与文件名一致，全局唯一
id: default_flat

# 显示格式模板，支持以下占位符：
#   {name}  - 属性显示名称（如 "物理伤害"）
#   {sign}  - 正负号（正数显示 "+"，负数显示 "-"）
#   {value} - 格式化后的数值
# 示例输出：物理伤害 +5.25
format: "{name} {sign}{value}"

# 小数精度：保留几位小数
precision: 2

# 读取优先级：当多个格式都能匹配同一行 Lore 时，优先级高的优先使用
# 数值越大优先级越高
read_priority: 50

# Lore 读取正则列表：用于从物品已有的 Lore 行中提取属性值
# {Key} 匹配属性显示名称，{Value} 匹配数值部分
# 此正则匹配形如 "物理伤害: 5.25" 的 Lore 行
read_patterns:
  - "{Key}.*?: ?{Value}$"
