id: "qing_feng_mu"
display_name: "<aqua>轻风木</aqua>"
description:
  - "<gray>可选材料: 迅捷增幅"
  - "<gray>偏向攻速与重击"

item: "bamboo"

capacity_cost:
  type: "constant"
  value: 10

priority:
  type: "constant"
  value: 20

effects:
  - type: "stat_contribution"
    stats:
      attack_speed:
        type: "constant"
        value: 8
      critical_damage:
        type: "constant"
        value: 15

  - type: "lore_action"
    action:
      - action: "insert_below"
        target_pattern: "锻造属性:"
        content:
          - "<aqua>攻击速度: +{attack_speed}%"
          - "<gold>暴击伤害: +{critical_damage}%"
