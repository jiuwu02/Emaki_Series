id: "flame_sword"
display_name: "<gold>烈焰之剑锻造配方</gold>"

target_item:
  item: "minecraft:diamond_sword"
  forge_capacity: 35

blueprint_requirements:
  - item: "minecraft:enchanted_book"
    amount: 1

materials:
  - item: "minecraft:iron_ingot"
    amount: 3
    capacity_cost: 5
    effects:
      - type: "stat_contribution"
        stats:
          physical_damage:
            type: "constant"
            value: 5
          max_health:
            type: "constant"
            value: 2
      - type: "lore_action"
        action:
          - action: "insert_below"
            target_pattern: "锻造属性:"
            content:
              - "<gray>物理伤害: <red>+{physical_damage}"
              - "<gray>生命值: <green>+{max_health}"

  - item: "minecraft:blaze_powder"
    amount: 1
    capacity_cost: 10
    effects:
      - type: "stat_contribution"
        stats:
          fire_damage:
            type: "constant"
            value: 10
          critical_chance:
            type: "constant"
            value: 5
      - type: "name_modify"
        action: "append_suffix"
        value: "<red> [烈焰]"
      - type: "lore_action"
        action:
          - action: "insert_below"
            target_pattern: "锻造属性:"
            content:
              - "<red>火焰伤害: +{fire_damage}"
              - "<yellow>暴击率: +{critical_chance}%"

  - item: "minecraft:fire_charge"
    amount: 1
    optional: true
    capacity_cost: 12
    effects:
      - type: "stat_contribution"
        stats:
          fire_damage:
            type: "constant"
            value: 12
          critical_chance:
            type: "constant"
            value: 4
      - type: "lore_action"
        action:
          - action: "insert_below"
            target_pattern: "锻造属性:"
            content:
              - "<red>火焰伤害: +{fire_damage}"
              - "<yellow>暴击率: +{critical_chance}%"

  - item: "minecraft:feather"
    amount: 1
    optional: true
    capacity_cost: 8
    effects:
      - type: "stat_contribution"
        stats:
          movement_speed:
            type: "constant"
            value: 3
          dodge_chance:
            type: "constant"
            value: 2

  - item: "minecraft:echo_shard"
    amount: 1
    optional: true
    capacity_cost: 15
    effects:
      - type: "stat_contribution"
        stats:
          magic_penetration:
            type: "constant"
            value: 6
          spell_crit_rate:
            type: "constant"
            value: 3

  - item: "minecraft:nether_star"
    amount: 1
    optional: true
    capacity_cost: 0
    effects:
      - type: "capacity_bonus"
        value: 20

optional_material_limit: 3

condition_type: "all_of"
conditions: []

quality:
  enabled: true
  custom_pool: []
  guarantee:
    enabled: true
    attempts: 60
    minimum: "无暇"

result:
  meta_actions:
    name_modifications:
      - action: "replace"
        value: "<gold>烈焰锻剑</gold>"
    lore_actions:
      - action: "append"
        content:
          - "<gray>锻造属性:"
          - "<dark_gray>由 EmakiForge 示例配方锻造"
  action:
    - 'sendmessage text="<green>锻造成功! 获得了 %forge_result_item_name%</green>"'
    - "playsound sound=minecraft:block.anvil.use volume=1 pitch=1"

action:
  pre:
    - 'sendactionbar text="<gray>烈焰之力正在熔铸...</gray>"'
  success: []
  failure:
    - '@if="%forge_error_key% == forge.error.action_failed" sendmessage text="<red>锻造前置操作失败: %forge_failure_reason%</red>"'
