id: "flame_sword"
display_name: "<gold>烈焰之剑锻造配方</gold>"

target_item:
  item: "diamond_sword"
  forge_capacity: 35

blueprint_requirements:
  - requirement_mode: "any_of"
    blueprint_options:
      - selector:
          kind: "id"
          value: "weapon_sword"
        count: 1
      - selector:
          kind: "id"
          value: "universal_blueprint"
        count: 1

required_materials:
  - id: "iron_essence"
    count: 3
  - id: "flame_crystal"
    count: 1

optional_materials:
  enabled: true
  whitelist:
    - "chi_yan_jing"
    - "qing_feng_mu"
    - "yun_lei_sha"
    - "forge_capacity_core"
  blacklist: []
  max_count: 3

condition_type: "all_of"
conditions: []

quality:
  enabled: true
  custom_pool: []
  guarantee:
    enabled: true
    attempts: 60
    minimum: "无暇"

gui:
  template: "forge_gui"
  slots:
    blueprint_inputs: [10, 11]
    target_item: [13]
    required_materials: [19, 20, 21]
    optional_materials: [28, 29, 30, 31, 32]
    capacity_display: [22]
    confirm: [40]
    result_preview: [24]

result:
  meta_actions:
    name_modifications:
      - action: "replace"
        value: "<gold>烈焰锻剑</gold>"
    lore_actions:
      - action: "append"
        content:
          - "<gray>锻造属性:"
          - "<dark_gray>由 EmakiForge 示例配方锻造"
  action:
    - 'sendmessage text="<green>锻造成功! 获得了 %forge_result_item_name%</green>"'
    - "playsound sound=minecraft:block.anvil.use volume=1 pitch=1"

action:
  pre:
    - 'sendactionbar text="<gray>烈焰之力正在熔铸...</gray>"'
  success: []
  failure:
    - '@if="%forge_error_key% == forge.error.action_failed" sendmessage text="<red>锻造前置操作失败: %forge_failure_reason%</red>"'
