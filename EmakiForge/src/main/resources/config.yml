# 锻造系统主配置
# version 由资源同步维护
version: "3.4.0"

# 语言文件 ID
language: "zh_CN"

# 是否写入默认资源
release_default_data: true

quality:
  # 品质池，格式为 "名称-权重-倍率"
  tiers:
    - "平庸-60-1.0"
    - "精良-30-1.05"
    - "有缺-10-0.95"
    - "优质-5-1.1"
    - "无暇-2-1.15"
    - "完美-1-1.2"

  # 随机失败时的回退品质
  default_tier: "平庸"

  guarantee:
    # 连续锻造达到阈值后的品质保底
    enabled: true
    threshold: 60
    minimum: "无暇"

  item_meta:
    # 是否将品质写入名称和 Lore
    enabled: true
    tiers:
      有缺:
        structured_presentation:
          name_contributions:
            - slot_id: "forge.quality.prefix"
              position: "PREFIX"
              order: 100
              content_template: "<color:#733333>[有缺]</color>"
      平庸:
        structured_presentation:
          name_contributions:
            - slot_id: "forge.quality.prefix"
              position: "PREFIX"
              order: 100
              content_template: "<color:#999999>[平庸]</color>"
      精良:
        structured_presentation:
          name_contributions:
            - slot_id: "forge.quality.prefix"
              position: "PREFIX"
              order: 100
              content_template: "<color:#1F871F>[精良]</color>"
      优质:
        structured_presentation:
          name_contributions:
            - slot_id: "forge.quality.prefix"
              position: "PREFIX"
              order: 100
              content_template: "<color:#00FF00>[优质]</color>"
      无暇:
        structured_presentation:
          name_contributions:
            - slot_id: "forge.quality.prefix"
              position: "PREFIX"
              order: 100
              content_template: "<color:#4B64C8>[无暇]</color>"
        action:
          - "broadcastmessage
            text=\"<color:#4B64C8>%player_name%锻造出了一个无暇品质的<show_item></color>\""
      完美:
        structured_presentation:
          name_contributions:
            - slot_id: "forge.quality.prefix"
              position: "PREFIX"
              order: 100
              content_template: "<color:#FFD700>[完美]</color>"
        action:
          - "broadcastmessage
            text=\"<color:#FFD700>%player_name%锻造出了一个完美品质的<show_item></color>\""

number_format:
  default: "0.##"
  integer: "0"
  percentage: "0.##%"

permission:
  # OP 是否跳过锻造条件检查
  op_bypass: false

condition:
  # 条件表达式解析失败时，是否视为条件不通过
  invalid_as_failure: true

history:
  enabled: true
  auto_save: true
  # 自动保存间隔，6000 tick = 5 分钟
  save_interval: 6000
