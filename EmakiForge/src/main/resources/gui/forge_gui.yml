id: "forge_gui"
title: "<dark_gray>锻造台 - {recipe}</dark_gray>"
rows: 5

slots:
  top_frame:
    slots: [0, 1, 2, 3, 4, 5, 6, 7, 8]
    item: "BLACK_STAINED_GLASS_PANE"
    display_name: "<gray>"

  side_frame:
    slots: [36, 37, 38, 39, 40, 41, 42, 43, 44]
    item: "BLACK_STAINED_GLASS_PANE"
    display_name: "<gray>"

  core_frame:
    slots: [9, 12, 15, 17, 18, 21, 24, 26, 27, 28, 30, 33, 35]
    item: "GRAY_STAINED_GLASS_PANE"
    display_name: "<dark_gray>"

  blueprint_inputs:
    slots: [10, 19]
    type: "blueprint_inputs"
    item: "guster_banner_pattern"
    display_name: "<light_purple>放入图纸</light_purple>"
    lore:
      - "<gray>支持通用图纸与武器图纸"

  target_item:
    slots: [25]
    type: "target_item"
    item: "NAME_TAG"
    display_name: "<aqua>INFO</aqua>"
    lore:
      - "<gray>锻造过程中不会展示成品"
      - "<gray>请在完成锻造后查看最终结果"

  capacity_display:
    slots: [16]
    type: "capacity_display"
    item: "BLAST_FURNACE"
    display_name: "<gray>锻造容量</gray>"
    lore:
      - "<gray>当前容量: <yellow>{current}</yellow>"
      - "<gray>容量上限: <gold>{max}</gold>"
      - "<gray>状态: {capacity_state}</gray>"

  required_materials:
    slots: [20, 11, 29]
    type: "required_materials"
    item: "BARRIER"
    display_name: "<gold>放入必需材料</gold>"
    lore:
      - "<gray>这里会优先接收固定需求材料"

  optional_materials:
    slots: [13, 14, 22, 23, 31, 32]
    type: "optional_materials"
    item: "BARRIER"
    display_name: "<green>放入可选材料</green>"
    lore:
      - "<gray>可选材料会消耗锻造容量"

  confirm:
    slots: [34]
    type: "confirm"
    item: "ANVIL"
    display_name: "<green>确认锻造</green>"
    lore:
      - "<gray>当前容量: <yellow>{current}/{max}</yellow>"
      - "<yellow>点击后开始执行锻造"
    click: "ui.button.click-1-1"

virtual_items:
  confirm_blocked:
    item: "BARRIER"
    display_name: "<red>无法锻造</red>"
    lore:
      - "<gray>当前容量: <yellow>{current}/{max}</yellow></gray>"
      - "<red>可选材料容量已超出上限</red>"
      - "<gray>减少材料后再试一次</gray>"

texts:
  capacity_state:
    waiting: "<gray>等待图纸</gray>"
    overflow: "<red>已超限</red>"
    warning: "<gold>接近上限</gold>"
    normal: "<green>正常</green>"
