    type: "recipe_list"
    item: "BOOK"
    display_name: "<gray>暂无配方</gray>"
    lore:
      - "<gray>这一页没有更多配方了"

  footer_fill:
    slots: [46, 47, 48, 50, 51, 52]
    item: "GRAY_STAINED_GLASS_PANE"
    display_name: "<gray>"
    hidden_components: ["tooltip"]

  prev_page:
    slots: [45]
    type: "prev_page"
    item: "ARROW"
    display_name: "<gray>上一页</gray>"
    lore:
      - "<gray>当前页码: <yellow>{page}/{pages}</yellow>"
    sounds:
      click:
        sound: "ui.button.click"
        volume: 1.0
        pitch: 1.0

  close:
    slots: [49]
    type: "close"
    item: "BARRIER"
    display_name: "<red>关闭</red>"
    lore:
      - "<gray>关闭配方图鉴</gray>"
    sounds:
      click:
        sound: "ui.button.click"
        volume: 1.0
        pitch: 1.0

  next_page:
    slots: [53]
    type: "next_page"
    item: "ARROW"
    display_name: "<gray>下一页</gray>"
    lore:
      - "<gray>当前页码: <yellow>{page}/{pages}</yellow>"
    sounds:
      click:
        sound: "ui.button.click"
        volume: 1.0
        pitch: 1.0

virtual_items:
  recipe_entry:
    display_name: "{recipe_name}"
    lore:
      - "{unlock_state}"
      - "<gray>配方ID: {recipe_id}</gray>"
      - "{crafted_state}"
      - "{click_hint}"

texts:
  recipe_entry:
    unlocked: "<green>可用</green>"
    locked: "<red>未解锁</red>"
    crafted: "<green>已完成过锻造</green>"
    uncrafted: "<gray>尚未完成锻造</gray>"
    click_hint: "<yellow>点击打开锻造界面</yellow>"
