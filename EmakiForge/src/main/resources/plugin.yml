name: EmakiForge
prefix: ${project.name}
main: emaki.jiuwu.craft.forge.EmakiForgePlugin
version: ${project.version}
api-version: "1.21"
depend:
  - EmakiCoreLib
softdepend:
  - PlaceholderAPI
commands:
  emakiforge:
    aliases: [eforge, ef]
    permission: emakiforge.use
permissions:
  emakiforge.use:
    default: true
  emakiforge.book:
    default: true
  emakiforge.reload:
    default: op
  emakiforge.debug:
    default: op
  emakiforge.editor:
    default: op
  emakiforge.editor.delete:
    default: op
  emakiforge.editor.*:
    default: op
    children:
      emakiforge.editor: true
      emakiforge.editor.delete: true
  emakiforge.admin:
    default: op
