name: EmakiForge
prefix: ${project.name}
main: emaki.jiuwu.craft.forge.EmakiForgePlugin
version: ${project.version}
api-version: "1.21"
depend:
  - EmakiCoreLib
softdepend:
  - EmakiAttribute
  - PlaceholderAPI
commands:
  emakiforge:
    aliases: [eforge, ef]
    permission: emakiforge.use
permissions:
  emakiforge.use:
    default: true
  emakiforge.book:
    default: true
  emakiforge.reload:
    default: op
  emakiforge.admin:
    default: op
