    capacity_exceeded: "<red>锻造容量超限! 当前: {current}/{max}</red>"
    material_not_allowed: "<red>此材料不在允许列表中!</red>"
    material_blacklisted: "<red>此材料被禁止使用!</red>"
    blueprint_required: "<red>缺少必要的图纸!</red>"
    material_required: "<red>缺少必要的材料!</red>"
    material_count_exceeded: "<red>可选材料数量超限!</red>"
    item_create: "<red>无法创建结果物品!</red>"
    action_failed: "<red>锻造操作执行失败: {reason}</red>"
    lore_search_not_found: "<red>未找到 Lore 搜索插入目标: {pattern}</red>"
    lore_invalid_action_name: "<red>Lore 搜索操作无效: {action}</red>"
    lore_invalid_regex: "<red>Lore 搜索正则无效: {pattern}</red>"

  success:
    crafted: "<green>锻造成功! 获得了 {item}</green>"
    quality: "<gold>品质: {quality} (倍率: {multiplier}x)</gold>"

# 图纸相关
blueprint:
  count_not_enough: "<red>图纸数量不足!</red>"

# 材料相关
material:
  count_not_enough: "<red>材料数量不足!</red>"

# GUI相关
gui:
  title:
    book: "<dark_gray>配方图鉴</dark_gray>"
    forge: "<dark_gray>锻造台 - {recipe}</dark_gray>"

  slot:
    blueprint: "<gray>放入图纸</gray>"
    target: "<aqua>放入目标物品</aqua>"
    required: "<gold>放入材料(任意槽位)</gold>"
    optional: "<green>放入材料(任意槽位)</green>"

  status:
    crafted: "<green>已锻造</green>"
    not_crafted: "<gray>未锻造</gray>"
    locked: "<red>未解锁</red>"

  display:
    capacity: "<gray>锻造容量: <yellow>{current}/{max}</yellow></gray>"
    capacity_warning: "<gold>锻造容量: {current}/{max} (接近上限)</gold>"
    capacity_exceeded: "<red>锻造容量: {current}/{max} (已超限!)</red>"
    capacity_pending: "<gray>锻造容量: 点击确认后匹配配方</gray>"

  button:
    confirm: "<green>确认锻造</green>"
    cancel: "<red>取消</red>"
    prev_page: "<gray>上一页</gray>"
    next_page: "<gray>下一页</gray>"
    close: "<red>关闭</red>"
