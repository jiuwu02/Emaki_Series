# 版本控制相关
version:
  config_outdated: "<yellow>配置文件版本过旧 (当前: <red>{current}</red>, 最新: <green>{latest}</green>)，正在增量更新...</yellow>"
  lang_outdated: "<yellow>语言文件版本过旧 (当前: <red>{current}</red>, 最新: <green>{latest}</green>)，正在增量更新...</yellow>"
  config_updating: "<white>正在更新配置文件...</white>"
  lang_updating: "<white>正在更新语言文件...</white>"
  config_updated: "<green>配置文件已更新, 新增 <yellow>{count}</yellow> <gray>个配置项</gray>"
  lang_updated: "<green>语言文件已更新, 新增 <yellow>{count}</yellow> <gray>个消息项</gray>"
  config_uptodate: "<gray>配置文件已是最新版本</gray>"
  lang_uptodate: "<gray>语言文件已是最新版本</gray>"
  config_missing_version: "<yellow>配置文件缺少版本号, 将执行增量更新...</yellow>"
  lang_missing_version: "<yellow>语言文件缺少版本号, 将执行增量更新...</yellow>"

