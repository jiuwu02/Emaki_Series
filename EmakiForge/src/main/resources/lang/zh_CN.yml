# Emaki Forge 中文语言文件
# 版本: 1.2

# 语言文件版本号 (请勿修改)
lang_version: "3.0.0"

# 通用消息
general:
  prefix: "<gray>[ <gradient:#F2C46D:#C9703D>EmakiForge</gradient> ]</gray>"
  no_permission: "<red>你没有权限执行此操作!</red>"
  player_only: "<red>此命令只能由玩家执行!</red>"
  unknown_command: "<red>未知的命令!</red>"
  invalid_args: "<red>无效的参数!</red>"
  reload_success: "<green>配置重载成功!</green>"
  reload_fail: "<red>配置重载失败!</red>"
  reload_summary: "<gray>已重载: 配置/语言/配方({recipes})/GUI({guis})</gray>"

# 命令帮助
command:
  help:
    header: "<gold>========== Emaki Forge 帮助 ==========</gold>"
    footer: "<gold>========================================</gold>"
    line: "<yellow>{cmd}</yellow> <gray>- {desc}</gray>"
    commands:
      help: "显示帮助信息"
      forge: "打开独立锻造台"
      book: "打开配方图鉴"
      reload: "重载配置文件"
      "list <type>": "列出配置项(recipes)"
      editor: "打开锻造资源编辑器"
      "edit recipe <id>": "编辑指定配方"
      "create recipe [id]": "创建新配方草稿"
      "delete recipe <id>": "删除指定配方"
  list:
    header: "<gold>========== {type} 列表 ==========</gold>"
    recipes_header: "<gold>========== 配方列表 (共 {count} 条) ==========</gold>"
    blueprints_header: "<gold>========== 图纸列表 (共 {count} 条) ==========</gold>"
    materials_header: "<gold>========== 材料列表 (共 {count} 条) ==========</gold>"
    recipe_line: "<yellow>{id}</yellow> <gray>- {name}</gray>"
    blueprint_line: "<yellow>{id}</yellow> <gray>- {name}</gray>"
    material_line: "<yellow>{id}</yellow> <gray>- {name} (消耗: {capacity}, 加成: +{bonus})</gray>"

