id: spell
display_name: "法术伤害"
aliases: [magic_damage, magic, spell_damage]
allowed_events:
  - MAGIC
hard_lock: true
stages:
  - id: attack
    kind: FLAT_PERCENT
    source: ATTACKER
    mode: ADD
    flat_attributes: [magic_attack]
    percent_attributes: [final_magic_damage]
  - id: crit
    kind: CUSTOM
    source: ATTACKER
    chance_attributes: [magic_crit_chance]
    multiplier_attributes: [magic_crit_multiplier]
    expression: "{input} * (1 + ({crit} * ({multiplier} / 100)))"
  - id: defense
    kind: FLAT_PERCENT
    source: TARGET
    mode: SUBTRACT
    flat_attributes: [magic_resistance]
    percent_attributes: []
recovery:
  source: ATTACKER
  resistance_source: TARGET
  flat_attributes: [flat_lifesteal]
  percent_attributes: [percent_lifesteal]
  resistance_attributes: [lifesteal_resistance]
attacker_message: "<gray>[<gold>{damage_type}</gold>]</gray> <green>你对 <white>{target}</white> 造成了 <yellow>{final_damage}</yellow> 点伤害</green>{critical_suffix}"
target_message: "<gray>[<gold>{damage_type}</gold>]</gray> <red>{attacker}</red> 对你造成了 <yellow>{final_damage}</yellow> 点伤害{critical_suffix}"
description: "Spell damage resolved entirely through Emaki attributes."
