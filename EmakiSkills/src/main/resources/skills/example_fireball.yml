id: fireball
display_name: "<gradient:#FF6B35:#FF4500>火球术</gradient>"
description:
  - "<gray>向前方发射一颗炽热的火球</gray>"
  - "<gray>对命中目标造成火焰伤害</gray>"
icon_material: "FIRE_CHARGE"
mythic_skill: "ExampleFireball"
trigger_type: "active"
cooldown_ticks: 100
global_cooldown_ticks: 20
lore_aliases:
  - "火球术"
  - "烈焰弹"
ui_category: "attack"
sort_order: 1
enabled: true
resource_costs:
  - type: "local-resource"
    target_id: "mana"
    amount: 30.0
    operation: "consume"
    failure_message: "魔力不足，需要 30 点魔力"

skill_parameters:
  damage:
    type: "expression"
    expression: "{base_damage} + {level_bonus}"
    variables:
      base_damage:
        type: "constant"
        value: 18
      level_bonus:
        type: "expression"
        expression: "({level} - 1) * 4"
    decimals: 1
    min: 0

  radius:
    type: "expression"
    expression: "2 + floor(({level} - 1) / 3) * 0.5"
    decimals: 2
    min: 1

  ignite_ticks:
    type: "expression"
    expression: "40 + ({level} - 1) * 6"
    decimals: 0
    min: 20

  element:
    type: "string"
    value: "fire"

  element_label:
    type: "string"
    value: "fire_lv_{level}"

  empowered:
    type: "boolean"
    expression: "{level} >= 5 && {has_target} == 1"
    default: false

upgrade:
  enabled: true
  max_level: 10
  gui_template: "upgrade/default"

  economy:
    enabled: true
    currencies:
      - provider: "vault"
        currency_id: ""
        base_cost: 1200
        cost_formula: "{base_cost} * {target_level}"
        display_name: "<gold>金币</gold>"

  success_rates:
    2: 100.0
    3: 100.0
    4: 95.0
    5: 90.0
    6: 80.0
    7: 70.0
    8: 60.0
    9: 50.0
    10: 40.0

  failure_penalty: "none"

  levels:
    2:
      materials:
        - item: "minecraft-blaze_powder"
          amount: 2
      success_actions: []
      failure_actions: []

    5:
      materials:
        - item: "minecraft-blaze_rod"
          amount: 1
      parameters:
        radius:
          type: "constant"
          value: 3.5
          decimals: 2
      success_actions:
        - "sendmessage text=\"<yellow>火球术达到 V，爆炸范围进一步扩大。</yellow>\""
      failure_actions: []

    10:
      economy:
        enabled: true
        currencies:
          - provider: "vault"
            currency_id: ""
            base_cost: 20000
            cost_formula: "{base_cost}"
            display_name: "<gold>金币</gold>"
      materials:
        - item: "minecraft-nether_star"
          amount: 1
      success_rate: 40.0
      success_actions:
        - "broadcast text=\"<gold>{player}</gold> <yellow>将火球术提升至满级！</yellow>\""
      failure_actions: []
