  too_fast: "<yellow>翻炒过快，请稍后再试。</yellow>"
  wrong_tool: "<yellow>需要手持配置中的锅铲才能翻炒或查看内容。</yellow>"
  burnt_timeout: "<red>火候断了太久，这锅已经糊了。</red>"
  stir_count: "<gray>翻炒次数: <yellow>{count}</yellow></gray>"
  ingredient_added: "<gray>已加入食材: <yellow>{item}</yellow></gray>"
  ingredient_returned: "<gray>已从炒锅取回食材: <yellow>{item}</yellow></gray>"
  no_recipe: "<yellow>当前食材组合还不能盛出成菜。</yellow>"
  completed_success: "<green>成功出锅: <yellow>{recipe}</yellow></green>"
  completed_undercooked: "<yellow>火候不足，做出了半生不熟的 <white>{recipe}</white></yellow>"
  completed_overcooked: "<red>火候过了，做出了焦糊的 <white>{recipe}</white></red>"
  completed_invalid: "<red>这锅菜做砸了。</red>"
  scalded: "<red>你被热锅烫到了，受到 {damage} 点伤害。</red>"
  info_header: "<gold>========== 炒锅内容 =========="
  info_line: "<gray>{index}. {item} x{amount} | 单项翻炒 {stir}</gray>"
  info_footer: "<gray>总翻炒: <yellow>{count}</yellow> | 火候: <yellow>{heat}</yellow></gray>"

steamer:
  no_heat_source: "<red>蒸锅下方缺少有效热源，无法打开。</red>"
  in_use: "<yellow>这口蒸锅正在被其他玩家使用，请稍后再试。</yellow>"
  open_failed: "<red>蒸锅 GUI 打开失败。</red>"
  opened: "<gray>蒸锅已打开。</gray>"
  add_fuel: "<gray>已加入燃料 <yellow>{item}</yellow>，预计持续 <yellow>{seconds}</yellow>
    秒。</gray>"
  add_moisture: "<gray>已加入水分源 <yellow>{item}</yellow>，增加 <aqua>{moisture}</aqua>
    点水分，当前总量 <aqua>{total}</aqua>。</gray>"
  info: "<gray>燃烧时间: <yellow>{burning_time}</yellow>秒 | 水分:
    <aqua>{moisture}</aqua> | 蒸汽: <white>{steam}</white> | 烹饪进度:
    <yellow>{progress}</yellow></gray>"
  progress_not_started: "未开始"
  progress_completed: "已完成"
