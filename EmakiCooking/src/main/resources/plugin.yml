name: EmakiCooking
prefix: ${project.name}
main: emaki.jiuwu.craft.cooking.EmakiCookingPlugin
version: ${project.version}
api-version: "1.21"
depend:
  - EmakiCoreLib
softdepend:
  - CraftEngine
commands:
  ecooking:
    aliases: [ec]
    permission: emakicooking.use
permissions:
  emakicooking.use:
    default: true
  emakicooking.reload:
    default: op
  emakicooking.inspect:
    default: op
  emakicooking.admin:
    default: op
  emakicooking.station.chopping_board.use:
    default: true
  emakicooking.station.chopping_board.cut:
    default: true
  emakicooking.station.wok.use:
    default: true
  emakicooking.station.wok.stir:
    default: true
  emakicooking.station.wok.serve:
    default: true
  emakicooking.station.grinder.use:
    default: true
  emakicooking.station.steamer.use:
    default: true
  emakicooking.station.steamer.fuel:
    default: true
  emakicooking.station.steamer.moisture:
    default: true
