# Emaki CoreLib Default Language File
# version is maintained by resource sync
version: "3.4.0"

general:
  prefix: "<gray>[<gold>EmakiCoreLib</gold>]</gray>"

console:
  plugin_starting: "<gray>Starting core library...</gray>"
  plugin_started: "<green>Core library started</green>"
  plugin_stopped: "<yellow>Core library stopped</yellow>"
  economy_bridge_ready: "<gray>Economy bridge connected: {provider}</gray>"
  action_config_load_failed: "<red>Failed to load action config: {error}</red>"
  item_source_bridge_ready: "<gray>Item source connected: {library}</gray>"
  item_source_bridge_waiting: "<gray>Detected {library}, waiting for item registration: {detail}</gray>"
  item_source_bridge_incompatible: "<yellow>{library} item source not connected: {detail}</yellow>"

loader:
  lang_directory_create_failed: "<red>Failed to create language directory: {path}</red>"
  bundled_language_load_failed: "<red>Failed to load bundled language: {error}</red>"
  bundled_resource_missing: "<red>Bundled resource missing: {resource}, cannot write to {path}</red>"
  bundled_resource_write_failed: "<red>Failed to write bundled resource: {path} ({error})</red>"
  directory_create_failed: "<red>Failed to create directory: {path}</red>"
  invalid_blank_id: "<red>{type} file {file} has a blank ID.</red>"
  duplicate_id: "<red>Skipped duplicate {type} ID {id}: {file}</red>"
  load_failed: "<red>Failed to load {type} file {file}: {error}</red>"
  bootstrap_cleanup_failed: "<red>Failed to clean up deprecated directory: {path} ({error})</red>"

action:
  debug_execution: "<gray>[Action]</gray> <white>phase={phase}</white>
    <white>id={id}</white> <gray>args={args}</gray>"
  execute_failed: "<red>[Action] Failed to execute {action}: {error}</red>"
