name: EmakiCoreLib
prefix: ${project.name}
main: emaki.jiuwu.craft.corelib.EmakiCoreLibPlugin
version: ${project.version}
api-version: "1.21"
author: JiuWu
description: Shared native Java core library for Emaki plugins
libraries:
  - net.kyori:adventure-platform-bukkit:${adventure.platform.version}
  - net.kyori:adventure-text-minimessage:${adventure.version}
  - net.kyori:adventure-text-serializer-legacy:${adventure.version}
  - net.kyori:adventure-text-serializer-plain:${adventure.version}
  - net.objecthunter:exp4j:${exp4j.version}
  - dev.dejvokep:boosted-yaml:${boosted.yaml.version}
  - com.github.ben-manes.caffeine:caffeine:${caffeine.version}
softdepend:
  - Vault
  - ExcellentEconomy
  - PlaceholderAPI
  - MMOItems
  - MythicMobs
  - ItemsAdder
  - Nexo
  - NeigeItems
  - CraftEngine
